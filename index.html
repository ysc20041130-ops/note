<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Love Story - Refined Full Version</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        /* --- 基礎變量與全局設定 --- */
        :root {
            --ysc-color: #607d8b;
            --lcl-color: #ffafbd;
            --bg-pink: #fdf2f4;
            --white: #ffffff;
            --gray-deep: #555555;   /* 星期顏色 */
            --gray-mid: #888888;    /* 日期顏色 */
            --gray-plan: #333333;   /* 未來計劃標題 */
            --shadow-standard: 0 12px 35px rgba(0,0,0,0.07);
            --curve: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition-fast: 0.3s ease;
            --transition-slow: 0.5s var(--curve);
        }

        * { 
            box-sizing: border-box; 
            font-family: "PingFang HK", "Helvetica Neue", "Microsoft JhengHei", sans-serif; 
            -webkit-tap-highlight-color: transparent; 
            outline: none;
        }

        body { 
            background: var(--bg-pink); 
            margin: 0; 
            padding: 0;
            overflow-x: hidden; 
            touch-action: pan-y; 
        }

        /* --- 身分選擇頁面 (Identity Screen) --- */
        #identity-screen {
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-pink); 
            z-index: 10000;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            transition: var(--transition-slow);
        }
        .welcome-title { 
            font-size: 2.8rem; 
            color: #8a8a8a; 
            margin-bottom: 60px; 
            font-weight: 300; 
            letter-spacing: 5px; 
            text-align: center;
        }
        .btn-identity {
            width: 320px; 
            padding: 28px; 
            margin: 18px; 
            border: none; 
            border-radius: 65px;
            font-size: 1.5rem; 
            font-weight: bold; 
            color: white; 
            cursor: pointer; 
            transition: var(--transition-slow);
            position: relative;
            overflow: hidden;
        }
        .btn-identity:active { transform: scale(0.92); }
        .btn-ysc-main { background: var(--ysc-color); box-shadow: 0 10px 30px rgba(96, 125, 139, 0.4); }
        .btn-lcl-main { background: var(--lcl-color); box-shadow: 0 10px 30px rgba(255, 175, 189, 0.4); }

        /* --- 頂部導航與全局撤回 --- */
        header {
            position: sticky; 
            top: 0; 
            z-index: 8000; 
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px); 
            border-bottom: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 2px 15px rgba(0,0,0,0.02);
        }
        nav { 
            display: flex; 
            justify-content: space-around; 
            padding: 22px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .nav-link { 
            background: none; 
            border: none; 
            font-size: 1.2rem; 
            font-weight: 800; 
            color: #d1d1d1; 
            cursor: pointer; 
            transition: var(--transition-fast); 
        }
        .nav-link.active { color: var(--accent); transform: scale(1.15); }

        #undo-master-btn {
            position: fixed; 
            top: 20px; 
            right: 20px; 
            z-index: 9000;
            background: var(--white); 
            border: 2px solid #f5f5f5; 
            border-radius: 50%; 
            width: 65px; 
            height: 65px;
            box-shadow: var(--shadow-standard); 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 1.8rem;
            transition: var(--transition-fast);
        }

        /* --- 手機優化垃圾桶 --- */
        #dynamic-trash {
            position: fixed; 
            top: 0; 
            right: -95px; 
            width: 85px; 
            height: 100vh;
            background: #ff4d4d; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            writing-mode: vertical-rl; 
            font-weight: 900; 
            letter-spacing: 12px; 
            z-index: 8500;
            transition: 0.4s var(--curve); 
            font-size: 1.6rem;
            box-shadow: -5px 0 25px rgba(255, 77, 77, 0.4);
        }
        #dynamic-trash.active { right: 0; }

        /* --- 容器與組件 --- */
        .main-scroller { 
            max-width: 1300px; 
            margin: 0 auto; 
            padding: 15px; /* 手機端縮小邊距 */
            height: calc(100vh - 80px);
            overflow-y: auto;
            touch-action: pan-y;
        }
        .app-view { display: none; }
        .app-view.active { display: block; animation: slideInUp 0.6s var(--curve); }

        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card { 
            background: var(--white); 
            border-radius: 35px; 
            padding: 25px; 
            margin-bottom: 25px; 
            box-shadow: var(--shadow-standard); 
            position: relative; 
        }

        /* --- 1. 紀念日曆模塊 - 手機大圖優化 --- */
        .hero-stats { text-align: center; }
        .text-together-days { 
            font-size: 1.8rem; /* 已縮小字號 */
            font-weight: 900; 
            color: var(--accent); 
            margin: 0; 
            letter-spacing: -0.5px; 
        }
        .text-happy-index { font-size: 1.1rem; color: #b0b0b0; margin: 10px 0 20px; font-weight: 500; }
        .btn-sign-daily {
            padding: 15px 55px; 
            border-radius: 50px; 
            border: none; 
            background: var(--accent);
            color: white; 
            font-weight: bold; 
            font-size: 1.2rem; 
            cursor: pointer; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        @media (min-width: 1024px) {
            .calendar-workspace { display: grid; grid-template-columns: 2.8fr 1.2fr; gap: 40px; }
        }

        /* 日曆去框化優化 */
        .calendar-container-flat { 
            padding: 5px 0; /* 移除左右多餘邊距，讓日曆更大 */
        }
        .calendar-week-labels { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            text-align: center; 
            padding: 12px 0; 
            color: var(--gray-deep); /* 星期深灰色 */
            font-weight: 900; 
            font-size: 0.85rem; 
        }
        .calendar-main-grid { 
            display: grid; 
            grid-template-columns: repeat(7, minmax(0, 1fr)); 
            gap: 4px; /* 縮小格子間距 */
        }
        .calendar-day-box {
            background: #fff; 
            border: 1px solid #f2f2f2; 
            border-radius: 12px; 
            min-height: 95px; 
            padding: 5px;
            display: flex; 
            flex-direction: column; 
            transition: 0.2s; 
            position: relative;
            overflow: hidden;
        }
        @media (max-width: 600px) {
            .calendar-day-box { min-height: 80px; } /* 手機端格子高度 */
        }
        .calendar-day-box.is-locked { background: #fdfdfd; color: #e5e5e5 !important; }
        .calendar-day-label { 
            font-size: 0.75rem; 
            font-weight: 800; 
            color: var(--gray-mid); /* 日期中灰色 */
            margin-bottom: 4px; 
        }

        .tag-event {
            background: var(--accent); 
            color: white; 
            font-size: 0.75rem; 
            padding: 5px 8px; 
            border-radius: 8px;
            margin-top: 4px; 
            word-break: break-all; 
            cursor: grab; 
            line-height: 1.2; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        .tag-event.dragging-active { 
            position: fixed; 
            pointer-events: none; 
            z-index: 11000; 
            width: auto !important; 
            max-width: 150px;
            transform: scale(1.1);
        }

        .heart-shortcut-anchor { position: absolute; right: -15px; top: 20px; }
        .btn-heart-pulse { 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            border: 3px solid var(--accent); 
            background: white; 
            color: var(--accent); 
            font-size: 1.4rem; 
            cursor: pointer; 
            box-shadow: var(--shadow-standard);
        }

        /* 未來計劃 */
        .plan-category-box { 
            background: #fafafa; 
            border: 2px dashed #eee; 
            border-radius: 30px; 
            padding: 22px; 
            min-height: 160px; 
            margin-bottom: 25px; 
        }
        .plan-category-box h4 { 
            margin: 0 0 15px 0; 
            font-size: 1.15rem; /* 標準字號 */
            color: var(--gray-plan); /* 極深灰色 */
            font-weight: 900; 
        }
        .plan-input-row { display: flex; gap: 8px; margin-top: 15px; }
        .plan-input-row input { 
            flex: 1; 
            border: 2px solid #f0f0f0; 
            border-radius: 12px; 
            padding: 12px 15px; 
            font-size: 0.9rem; 
        }
        .plan-input-row button { 
            border: none; 
            background: var(--accent); 
            color: white; 
            border-radius: 12px; 
            padding: 0 20px; 
            font-weight: 900; 
        }

        /* --- 2. 寶寶通訊 --- */
        #chat-message-container { 
            height: 68vh; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
            background: #fff;
            border-radius: 25px;
        }
        .chat-bubble-row { display: flex; flex-direction: column; width: 100%; }
        .chat-bubble-row.me { align-items: flex-end; }
        .chat-bubble-row.you { align-items: flex-start; }
        .chat-msg-body { 
            max-width: 85%; 
            padding: 15px 20px; 
            border-radius: 25px; 
            font-size: 1.05rem; 
            line-height: 1.5; 
        }
        .me .chat-msg-body { background: var(--accent); color: white; border-bottom-right-radius: 5px; }
        .you .chat-msg-body { background: #f4f4f4; color: #333; border-bottom-left-radius: 5px; }
        .chat-msg-time { font-size: 0.7rem; color: #ccc; margin-top: 8px; }

        .chat-dock-fixed {
            position: fixed; 
            bottom: 0; left: 0; 
            width: 100%; 
            background: white; 
            padding: 15px 20px 40px;
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-top: 1px solid #f0f0f0; 
            z-index: 7500;
        }
        .chat-input-pill { 
            flex: 1; 
            background: #f7f7f7; 
            border-radius: 40px; 
            display: flex; 
            align-items: center; 
            padding: 0 20px; 
        }
        .chat-input-pill input { 
            flex: 1; 
            border: none; 
            background: transparent; 
            padding: 14px 0; 
            font-size: 1rem; 
        }
        .btn-chat-send { 
            background: #4caf50; 
            color: white; 
            border: none; 
            width: 50px; 
            height: 50px; 
            border-radius: 50%; 
            cursor: pointer; 
            font-size: 1.4rem; 
            display: flex; 
            align-items: center; 
            justify-content: center;
        }

        /* --- 3. 歷史紀錄 --- */
        .history-card-item { 
            padding: 25px; 
            border-bottom: 1.5px solid #fafafa; 
            position: relative; 
        }
        .history-main-label { display: block; font-weight: 900; color: #444; font-size: 1.15rem; margin-bottom: 8px; }
        .history-date-label { font-size: 0.8rem; color: #bbb; }
        .btn-history-delete { 
            position: absolute; 
            right: 25px; 
            top: 30px; 
            color: #ddd; 
            cursor: pointer; 
            font-size: 1.3rem; 
        }

        #gemini-report-trigger {
            position: fixed; 
            bottom: 120px; 
            left: 50%; 
            transform: translateX(-50%);
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb);
            background-size: 200%; 
            padding: 20px 45px; 
            border-radius: 70px; 
            color: white; 
            border: none; 
            font-weight: 900;
            box-shadow: 0 10px 35px rgba(0,0,0,0.15); 
            cursor: pointer; 
            z-index: 7000; 
            font-size: 1.15rem;
        }
    </style>
</head>
<body>

    <div id="identity-screen">
        <div class="welcome-title">和你的Love Story</div>
        <button class="btn-identity btn-ysc-main" onclick="startApp('ysc')">我是 ysc</button>
        <button class="btn-identity btn-lcl-main" onclick="startApp('lcl')">我是 lcl</button>
    </div>

    <button id="undo-master-btn" title="撤回上一個操作" onclick="handleUndoSystem()">↩️</button>
    <div id="dynamic-trash">🗑️ 拖到此處刪除</div>

    <header>
        <nav>
            <button class="nav-link active" id="btn-nav-cal" onclick="navigateTo('cal')">紀念日曆</button>
            <button class="nav-link" id="btn-nav-chat" onclick="navigateTo('chat')">寶寶通訊</button>
            <button class="nav-link" id="btn-nav-hist" onclick="navigateTo('hist')">歷史紀錄</button>
        </nav>
    </header>

    <div class="main-scroller">
        
        <div id="view-cal" class="app-view active">
            <div class="glass-card hero-stats">
                <p class="text-together-days" id="val-together-days">在一起 0 日</p>
                <p class="text-happy-index" id="val-happiness-score">我們的幸福指數：0.0</p>
                <button class="btn-sign-daily" onclick="executeSignAction()">打卡</button>
            </div>

            <div class="calendar-workspace">
                <div class="calendar-column-left">
                    <div class="glass-card">
                        <small style="color:#000; font-weight:900; letter-spacing:1px; text-transform:uppercase; font-size:1.15rem;">🔔 給對方的小提醒</small>
                        <div id="reminder-display-list" style="margin-top:20px;"></div>
                        <div class="plan-input-row">
                            <input type="text" id="remind-msg-input" placeholder="填入的提示僅對方可見">
                            <button onclick="submitRemindToPartner()">發送</button>
                        </div>
                    </div>

                    <div class="calendar-container-flat">
                        <div class="heart-shortcut-anchor">
                            <button class="btn-heart-pulse" onclick="quickAddHeartToCalendar()">❤️</button>
                        </div>
                        <div class="calendar-week-labels">
                            <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                        </div>
                        <div id="calendar-render-grid" class="calendar-main-grid"></div>
                    </div>
                </div>

                <div class="plan-column-right" style="margin-top:25px;">
                    <div class="plan-category-box" id="pbox-eat">
                        <h4>🍔 豬癮犯了</h4>
                        <div class="plan-render-list" id="list-render-eat"></div>
                        <div class="plan-input-row">
                            <input type="text" id="in-plan-eat" placeholder="想吃什麼...">
                            <button onclick="createNewPlanItem('eat')">+</button>
                        </div>
                    </div>
                    <div class="plan-category-box" id="pbox-go">
                        <h4>📍 腳好累呀</h4>
                        <div class="plan-render-list" id="list-render-go"></div>
                        <div class="plan-input-row">
                            <input type="text" id="in-plan-go" placeholder="想到哪裡...">
                            <button onclick="createNewPlanItem('go')">+</button>
                        </div>
                    </div>
                    <div class="plan-category-box" id="pbox-do">
                        <h4>✨ 好無聊呀</h4>
                        <div class="plan-render-list" id="list-render-do"></div>
                        <div class="plan-input-row">
                            <input type="text" id="in-plan-do" placeholder="想做什麼...">
                            <button onclick="createNewPlanItem('do')">+</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-chat" class="app-view">
            <div id="chat-message-container"></div>
            <div class="chat-dock-fixed">
                <input type="file" id="chat-file-upload" hidden accept="image/*" onchange="processChatImage(this)">
                <span style="font-size: 2rem; cursor:pointer;" onclick="document.getElementById('chat-file-upload').click()">🖼️</span>
                <div class="chat-input-pill">
                    <input type="text" id="chat-text-field" placeholder="傳送甜蜜訊息...">
                </div>
                <button class="btn-chat-send" onclick="sendChatTextMessage()">↑</button>
            </div>
        </div>

        <div id="view-hist" class="app-view">
            <div id="history-master-list"></div>
            <button id="gemini-report-trigger" onclick="requestGeminiAnalysis()">交給 Gemini 生成我們的戀愛報告</button>
        </div>

    </div>

    <script>
        // Firebase 配置
        const FB_CONFIG = {
            apiKey: "AIzaSyDvzd2ZhT-HfuJoJ28S14cun-6D_wNILtg",
            authDomain: "ourloveplanner.firebaseapp.com",
            databaseURL: "https://ourloveplanner-default-rtdb.firebaseio.com",
            projectId: "ourloveplanner",
            storageBucket: "ourloveplanner.firebasestorage.app",
            messagingSenderId: "671815155990",
            appId: "1:671815155990:web:ce0adcdd59f1778cb41037"
        };
        firebase.initializeApp(FB_CONFIG);
        const rtdb = firebase.database();

        let CURRENT_USER = '';
        let UNDO_STACK = []; 
        let DRAG_CONTEXT = null; 
        let DRAG_MIRROR_DOM = null; 
        const DATE_RELATIONSHIP_START = new Date('2024-09-18');

        function startApp(userRole) {
            CURRENT_USER = userRole;
            document.getElementById('identity-screen').style.display = 'none';
            document.documentElement.style.setProperty('--accent', userRole === 'ysc' ? 'var(--ysc-color)' : 'var(--lcl-color)');
            
            const daysCount = Math.ceil(Math.abs(new Date() - DATE_RELATIONSHIP_START) / (1000 * 60 * 60 * 24));
            document.getElementById('val-together-days').innerText = `在一起 ${daysCount} 日`;
            
            initializeDataSynchronization();
            runBackgroundAutomations();
        }

        function navigateTo(targetId) {
            document.querySelectorAll('.app-view, .nav-link').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + targetId).classList.add('active');
            document.getElementById('btn-nav-' + targetId).classList.add('active');
            if(targetId === 'chat') {
                const s = document.getElementById('chat-message-container');
                s.scrollTop = s.scrollHeight;
            }
        }

        async function createSystemSnapshot(actionLabel) {
            const snapshot = await rtdb.ref('love_v11_clean').once('value');
            UNDO_STACK.push({ payload: snapshot.val(), label: actionLabel });
        }

        function handleUndoSystem() {
            if (!UNDO_STACK.length) return alert("沒有可撤回的操作");
            const lastPoint = UNDO_STACK.pop();
            rtdb.ref('love_v11_clean').set(lastPoint.payload);
            alert(`已撤回：${lastPoint.label}`);
        }

        function initializeDataSynchronization() {
            rtdb.ref('love_v11_clean').on('value', snapshot => {
                const data = snapshot.val() || {};
                renderCalendarModule(data.calendar || {});
                renderReminderModule(data.reminders || {});
                renderPlanModule(data.plans || {});
                renderChatModule(data.chats || {});
                renderHistoryModule(data.history || {});
                calculateHappinessMetric(data.calendar || {}, data.signs || {});
            });
        }

        // 拖拽邏輯
        function setupDraggable(domElement, metadata) {
            const handleStart = (posX, posY) => {
                DRAG_CONTEXT = metadata;
                DRAG_MIRROR_DOM = domElement.cloneNode(true);
                DRAG_MIRROR_DOM.classList.add('tag-event', 'dragging-active');
                DRAG_MIRROR_DOM.style.left = posX - 30 + 'px';
                DRAG_MIRROR_DOM.style.top = posY - 15 + 'px';
                document.body.appendChild(DRAG_MIRROR_DOM);
                document.getElementById('dynamic-trash').classList.add('active');
            };
            domElement.onmousedown = (e) => handleStart(e.clientX, e.clientY);
            domElement.ontouchstart = (e) => handleStart(e.touches[0].clientX, e.touches[0].clientY);
        }

        window.onmousemove = window.ontouchmove = (e) => {
            if (!DRAG_MIRROR_DOM) return;
            const x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            const y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
            DRAG_MIRROR_DOM.style.left = x - 30 + 'px';
            DRAG_MIRROR_DOM.style.top = y - 15 + 'px';
        };

        window.onmouseup = window.ontouchend = (e) => {
            if (!DRAG_MIRROR_DOM) return;
            const finalX = e.clientX || (e.changedTouches ? e.changedTouches[0].clientX : 0);
            const finalY = e.clientY || (e.changedTouches ? e.changedTouches[0].clientY : 0);
            const target = document.elementFromPoint(finalX, finalY);
            
            const trash = document.getElementById('dynamic-trash');
            if (target === trash || trash.contains(target)) {
                createSystemSnapshot(`刪除 ${DRAG_CONTEXT.val}`);
                if (DRAG_CONTEXT.source === 'CAL') rtdb.ref(`love_v11_clean/calendar/${DRAG_CONTEXT.date}/${DRAG_CONTEXT.id}`).remove();
                else rtdb.ref(`love_v11_clean/plans/${DRAG_CONTEXT.cat}/${DRAG_CONTEXT.id}`).remove();
            } else {
                const dayBox = target.closest('.calendar-day-box');
                if (dayBox) {
                    const newDate = dayBox.dataset.date;
                    createSystemSnapshot(`移動 ${DRAG_CONTEXT.val}`);
                    if (DRAG_CONTEXT.source === 'CAL') rtdb.ref(`love_v11_clean/calendar/${DRAG_CONTEXT.date}/${DRAG_CONTEXT.id}`).remove();
                    else rtdb.ref(`love_v11_clean/plans/${DRAG_CONTEXT.cat}/${DRAG_CONTEXT.id}`).remove();
                    rtdb.ref(`love_v11_clean/calendar/${newDate}`).push(DRAG_CONTEXT.val);
                }
            }
            DRAG_MIRROR_DOM.remove(); DRAG_MIRROR_DOM = null; DRAG_CONTEXT = null;
            trash.classList.remove('active');
        };

        function renderCalendarModule(calData) {
            const grid = document.getElementById('calendar-render-grid');
            grid.innerHTML = '';
            const today = new Date();
            const startPoint = new Date(today);
            startPoint.setDate(today.getDate() - today.getDay());
            const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

            for (let i = 0; i < 35; i++) {
                const day = new Date(startPoint);
                day.setDate(startPoint.getDate() + i);
                const isoKey = day.toISOString().split('T')[0];
                const isPast = day < new Date().setHours(0,0,0,0);

                const cell = document.createElement('div');
                cell.className = `calendar-day-box ${isPast ? 'is-locked' : ''}`;
                cell.dataset.date = isoKey;
                cell.innerHTML = `<span class="calendar-day-label">${day.getDate()}/${months[day.getMonth()]}</span>`;

                if (calData[isoKey]) {
                    Object.entries(calData[isoKey]).forEach(([id, val]) => {
                        const tag = document.createElement('div');
                        tag.className = 'tag-event'; tag.innerText = val;
                        setupDraggable(tag, { source: 'CAL', date: isoKey, id, val });
                        cell.appendChild(tag);
                    });
                }
                cell.onclick = (e) => {
                    if (e.target === cell) {
                        const txt = prompt("添加事件：");
                        if (txt) sendDataToPath(`calendar/${isoKey}`, txt, `添加: ${txt}`);
                    }
                };
                grid.appendChild(cell);
            }
        }

        function renderPlanModule(plans) {
            ['eat', 'go', 'do'].forEach(type => {
                const listDom = document.getElementById('list-render-' + type);
                listDom.innerHTML = '';
                Object.entries(plans[type] || {}).forEach(([id, val]) => {
                    const tag = document.createElement('div');
                    tag.className = 'tag-event'; tag.innerText = val;
                    setupDraggable(tag, { source: 'PLAN', cat: type, id, val });
                    listDom.appendChild(tag);
                });
            });
        }

        function renderReminderModule(reminders) {
            const area = document.getElementById('reminder-display-list');
            area.innerHTML = '';
            Object.entries(reminders[CURRENT_USER] || {}).forEach(([id, info]) => {
                const card = document.createElement('div');
                card.className = 'glass-card';
                card.style = "padding:15px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center;";
                card.innerHTML = `<span>💌 ${info.msg}</span><button onclick="clearReminder('${id}')" style="background:none; border:none; font-size:1.8rem;">✅</button>`;
                area.appendChild(card);
            });
        }

        function sendDataToPath(path, val, logMsg) {
            createSystemSnapshot(logMsg);
            rtdb.ref('love_v11_clean/' + path).push(val);
            if (!path.includes('chats')) recordToHistory(logMsg);
            rtdb.ref('love_v11_clean/last_interaction').set(Date.now());
        }

        async function executeSignAction() {
            const todayK = new Date().toISOString().split('T')[0];
            const check = await rtdb.ref(`love_v11_clean/signs/${todayK}/${CURRENT_USER}`).once('value');
            if (check.exists()) return alert("今天已打過卡啦");
            createSystemSnapshot("打卡");
            rtdb.ref(`love_v11_clean/signs/${todayK}/${CURRENT_USER}`).set(true);
            recordToHistory("今日打卡成功！");
        }

        function recordToHistory(txt) {
            const d = new Date();
            const timeStr = `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes()}`;
            rtdb.ref('love_v11_clean/history').push({ text: txt, ts: timeStr });
        }

        function calculateHappinessMetric(cal, signs) {
            let l = 0, b = 0, s = 0;
            const limit = Date.now() - 30 * 86400000;
            Object.entries(cal).forEach(([d, items]) => {
                if (new Date(d) > limit) Object.values(items).forEach(v => {
                    if(v.includes('❤️')) l++; if(v.includes('💣')) b++;
                });
            });
            Object.entries(signs || {}).forEach(([d, us]) => { if (new Date(d) > limit) s += Object.keys(us).length; });
            document.getElementById('val-happiness-score').innerText = `我們的幸福指數：${((l - b) * 7 + s).toFixed(1)}`;
        }

        function runBackgroundAutomations() {
            setInterval(async () => {
                const n = new Date();
                if (n.getHours() === 23 && n.getMinutes() === 59 && n.getSeconds() === 59) {
                    const snap = await rtdb.ref('love_v11_clean').once('value');
                    const d = snap.val() || {};
                    if (Date.now() - (d.last_interaction || 0) > 86400000) {
                        rtdb.ref(`love_v11_clean/calendar/${n.toISOString().split('T')[0]}`).push('💣');
                        recordToHistory("💣好像和寶寶吵架了");
                    }
                }
            }, 1000);
            if (CURRENT_USER === 'ysc') {
                const k = 'bot_v11_' + new Date().toDateString();
                if (!localStorage.getItem(k)) {
                    setTimeout(() => {
                        rtdb.ref('love_v11_clean/chats').push({ type: 'text', val: "我是余尚初的小替身，他偷偷告訴我說他想你了🥺", sender: 'ysc', ts: Date.now() });
                        localStorage.setItem(k, '1');
                    }, Math.random() * 4 * 3600000 + 8 * 3600000);
                }
            }
        }

        function sendChatTextMessage() {
            const f = document.getElementById('chat-text-field');
            if (!f.value) return;
            rtdb.ref('love_v11_clean/chats').push({ type: 'text', val: f.value, sender: CURRENT_USER, ts: Date.now() });
            f.value = '';
        }

        function renderChatModule(chats) {
            const c = document.getElementById('chat-message-container');
            c.innerHTML = '';
            Object.entries(chats).forEach(([id, m]) => {
                const row = document.createElement('div');
                row.className = `chat-bubble-row ${m.sender === CURRENT_USER ? 'me' : 'you'}`;
                row.innerHTML = `<div class="chat-msg-body">${m.val}</div><div class="chat-msg-time">${new Date(m.ts).toLocaleString()}</div>`;
                c.appendChild(row);
            });
            c.scrollTop = c.scrollHeight;
        }

        function renderHistoryModule(hist) {
            const l = document.getElementById('history-master-list');
            l.innerHTML = '';
            Object.entries(hist).reverse().forEach(([id, item]) => {
                const e = document.createElement('div');
                e.className = 'history-card-item';
                e.innerHTML = `<span class="history-main-label">${item.text}</span><span class="history-date-label">${item.ts}</span><span class="btn-history-delete" onclick="deleteHist('${id}')">🗑️</span>`;
                l.appendChild(e);
            });
        }

        function deleteHist(id) { if(confirm("刪除此紀錄？")) rtdb.ref(`love_v11_clean/history/${id}`).remove(); }
        function clearReminder(id) { rtdb.ref(`love_v11_clean/reminders/${CURRENT_USER}/${id}`).remove(); }
        function submitRemindToPartner() {
            const inp = document.getElementById('remind-msg-input');
            const target = CURRENT_USER === 'ysc' ? 'lcl' : 'ysc';
            if(inp.value) sendDataToPath(`reminders/${target}`, { msg: inp.value, from: CURRENT_USER, ts: Date.now() }, "發送提醒");
            inp.value = '';
        }
        function createNewPlanItem(cat) {
            const inp = document.getElementById('in-plan-' + cat);
            if(inp.value) sendDataToPath(`plans/${cat}`, inp.value, `添加計劃: ${inp.value}`);
            inp.value = '';
        }
        function quickAddHeartToCalendar() {
            const k = new Date().toISOString().split('T')[0];
            sendDataToPath(`calendar/${k}`, '❤️', "添加了 ❤️");
        }
        function requestGeminiAnalysis() { alert("Gemini 正在打包數據..."); }
    </script>
</body>
</html>
