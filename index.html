<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Love Plan - 我們的專屬空間</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --ysc-blue: #607d8b;
            --lcl-pink: #ffafbd;
            --bg-pink: #fdf2f4;
            --white: #ffffff;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * { box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: var(--bg-pink); margin: 0; padding-bottom: 80px; overflow-x: hidden; -webkit-user-select: none; }

        /* --- 1. 身分選擇頁面 --- */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-pink); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-prompt { font-size: 1.2rem; color: #888; margin-bottom: 30px; letter-spacing: 2px; }
        .btn-auth {
            width: 200px; padding: 18px; margin: 12px; border: none; border-radius: 50px;
            font-size: 1.1rem; font-weight: bold; color: white; cursor: pointer; transition: var(--transition);
        }
        .btn-ysc { background: var(--ysc-blue); box-shadow: 0 4px 15px rgba(96, 125, 139, 0.3); }
        .btn-lcl { background: var(--lcl-pink); box-shadow: 0 4px 15px rgba(255, 175, 189, 0.3); }
        .btn-auth:active { transform: scale(0.95); }

        /* --- 2. 導航切換 --- */
        #nav-bar {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; padding: 15px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .nav-btn {
            background: none; border: none; font-size: 1rem; font-weight: bold;
            color: #ccc; cursor: pointer; transition: var(--transition);
        }
        .nav-btn.active { color: var(--accent); transform: scale(1.1); }

        /* --- 3. 通用組件 --- */
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background: white; border-radius: 30px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        
        /* 撤回按鈕 */
        #undo-btn {
            position: fixed; top: 80px; right: 20px; z-index: 999;
            background: white; border: 1.5px solid #eee; border-radius: 50%;
            width: 45px; height: 45px; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 1.2rem;
        }

        /* --- 4. 紀念日曆模塊 --- */
        .info-panel { text-align: center; margin-bottom: 20px; }
        .days-count { font-size: 1.5rem; font-weight: 900; color: var(--accent); }
        .happiness-index { font-size: 0.85rem; color: #aaa; margin-top: 5px; }

        /* 提醒模塊 */
        .remind-input { display: flex; gap: 10px; margin-top: 15px; background: #f9f9f9; padding: 8px; border-radius: 15px; }
        .remind-input input { flex: 1; border: none; background: transparent; padding: 10px; outline: none; }
        .remind-item { display: flex; justify-content: space-between; align-items: center; background: #fff5f7; padding: 12px; border-radius: 12px; margin-top: 10px; }

        /* 日曆表格 */
        .cal-header { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 10px; font-weight: bold; font-size: 0.8rem; color: #ddd; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .cal-day {
            background: #fff; border: 1px solid #f2f2f2; border-radius: 12px; min-height: 90px;
            padding: 5px; position: relative; transition: 0.2s;
        }
        .cal-day.past { background: #fcfcfc; color: #eee; }
        .day-label { font-size: 0.7rem; font-weight: 800; display: block; margin-bottom: 5px; }
        .event-tag {
            background: var(--accent); color: white; font-size: 0.65rem; padding: 2px 5px;
            border-radius: 5px; margin-bottom: 3px; cursor: grab; word-break: break-all;
        }
        .heart-quick-btn {
            position: absolute; right: -15px; top: 100px;
            background: white; border: 1px solid var(--accent); color: var(--accent);
            width: 40px; height: 40px; border-radius: 50%; cursor: pointer;
        }

        /* 垃圾桶 */
        #trash-bar {
            position: fixed; top: 0; right: -100px; width: 80px; height: 100%;
            background: #ff4d4d; color: white; display: flex; align-items: center; justify-content: center;
            writing-mode: vertical-rl; font-weight: bold; letter-spacing: 5px; z-index: 2000; transition: var(--transition);
        }
        #trash-bar.active { right: 0; }

        /* 未來計劃 */
        .plan-section { margin-top: 20px; display: grid; grid-template-columns: 1fr; gap: 15px; }
        .plan-box { background: #fafafa; border-radius: 20px; padding: 15px; border: 1px dashed #ddd; }
        .plan-box h4 { margin: 0 0 10px 0; font-size: 0.85rem; color: #888; }

        /* --- 5. 寶寶通訊 --- */
        #chat-window { height: 60vh; overflow-y: auto; padding: 15px; background: #fefefe; border-radius: 25px; display: flex; flex-direction: column; gap: 12px; }
        .msg-wrap { display: flex; flex-direction: column; width: 100%; }
        .msg-wrap.me { align-items: flex-end; }
        .msg-wrap.other { align-items: flex-start; }
        .bubble {
            max-width: 75%; padding: 12px 16px; border-radius: 20px; font-size: 0.95rem; line-height: 1.4;
            position: relative;
        }
        .me .bubble { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .other .bubble { background: #efefef; color: #333; border-bottom-left-radius: 4px; }
        .msg-time { font-size: 0.65rem; color: #bbb; margin-top: 5px; }
        .chat-img { max-width: 200px; border-radius: 15px; margin-top: 5px; }
        
        #chat-footer {
            position: fixed; bottom: 0; left: 0; width: 100%; background: white;
            padding: 15px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #eee;
        }
        .chat-input { flex: 1; border: none; background: #f0f0f0; padding: 12px 18px; border-radius: 30px; outline: none; }
        .btn-photo { font-size: 1.5rem; cursor: pointer; }
        .btn-send { background: #4caf50; color: white; border: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        /* --- 6. 歷史與 Gemini --- */
        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-card { padding: 15px; border-bottom: 1px solid #f5f5f5; position: relative; }
        .del-hist { position: absolute; right: 10px; top: 15px; color: #ccc; cursor: pointer; font-size: 0.8rem; }
        
        #gemini-btn {
            position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb);
            padding: 15px 25px; border-radius: 50px; border: none; color: white;
            font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer;
            animation: rainbow 5s infinite;
        }
        @keyframes rainbow { 0%{filter: hue-rotate(0deg);} 100%{filter: hue-rotate(360deg);} }

        /* 彈窗選擇器 */
        #picker-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 11000; display: none;
            align-items: center; justify-content: center;
        }
        .picker-menu { background: white; padding: 25px; border-radius: 25px; width: 280px; text-align: center; }
        .picker-option { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; color: #555; font-weight: 500; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-prompt">請選擇你的身分</div>
        <button class="btn-auth btn-ysc" onclick="initApp('ysc')">我是 ysc</button>
        <button class="btn-auth btn-lcl" onclick="initApp('lcl')">我是 lcl</button>
    </div>

    <div id="trash-bar">🗑️ 拖到此處刪除</div>

    <button id="undo-btn" onclick="undoAction()">↩️</button>

    <nav id="nav-bar">
        <button class="nav-btn active" onclick="switchView('calendar', this)">紀念日曆</button>
        <button class="nav-btn" onclick="switchView('chat', this)">寶寶通訊</button>
        <button class="nav-btn" onclick="switchView('history', this)">歷史紀錄</button>
    </nav>

    <div class="container">
        
        <div id="view-calendar" class="view active">
            <div class="info-panel">
                <div class="days-count" id="days-display">在一起 1 日</div>
                <div class="happiness-index" id="happiness-display">我們的幸福指數：0.0</div>
            </div>

            <div class="card">
                <div style="font-size:0.9rem; font-weight:bold; color:#888;">🔔 給對方的小提醒</div>
                <div id="remind-display-area"></div>
                <div class="remind-input">
                    <input type="text" id="remind-input-field" placeholder="填入的提示僅對方可見">
                    <button class="btn-send" onclick="sendReminder()" style="background:var(--accent)">發送</button>
                </div>
            </div>

            <div class="card" style="position:relative;">
                <button class="heart-quick-btn" onclick="quickAddLove()">➕❤️</button>
                <div class="cal-header">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="calendar-grid-body" class="cal-grid"></div>
            </div>

            <div class="plan-section">
                <div class="plan-box" id="box-eat" ondragover="allowDrop(event)" ondrop="dropToPlan(event, 'eat')">
                    <h4>🍔 豬癮犯了</h4>
                    <div class="list-container" id="list-eat"></div>
                    <div class="remind-input"><input type="text" id="in-eat" placeholder="想吃什麼..."><button onclick="addPlan('eat')">+</button></div>
                </div>
                <div class="plan-box" id="box-go" ondragover="allowDrop(event)" ondrop="dropToPlan(event, 'go')">
                    <h4>📍 腳好累</h4>
                    <div class="list-container" id="list-go"></div>
                    <div class="remind-input"><input type="text" id="in-go" placeholder="想到哪裡..."><button onclick="addPlan('go')">+</button></div>
                </div>
                <div class="plan-box" id="box-do" ondragover="allowDrop(event)" ondrop="dropToPlan(event, 'do')">
                    <h4>✨ 好無聊呀</h4>
                    <div class="list-container" id="list-do"></div>
                    <div class="remind-input"><input type="text" id="in-do" placeholder="想做什麼..."><button onclick="addPlan('do')">+</button></div>
                </div>
            </div>
        </div>

        <div id="view-chat" class="view">
            <div id="chat-window"></div>
            <div id="chat-footer">
                <input type="file" id="file-input" hidden accept="image/*" onchange="handleImage(this)">
                <span class="btn-photo" onclick="document.getElementById('file-input').click()">🖼️</span>
                <input type="text" id="chat-msg-input" class="chat-input" placeholder="說點什麼...">
                <button class="btn-send" onclick="sendChatMessage()">送出</button>
            </div>
        </div>

        <div id="view-history" class="view">
            <div class="history-list" id="history-render-area"></div>
            <button id="gemini-btn" onclick="togglePicker()">交給 Gemini 生成我們的戀愛報告</button>
        </div>

    </div>

    <div id="picker-overlay" onclick="togglePicker()">
        <div class="picker-menu" onclick="event.stopPropagation()">
            <div class="picker-option" onclick="generateReport('週')">一週回顧</div>
            <div class="picker-option" onclick="generateReport('月')">一個月深度</div>
            <div class="picker-option" onclick="generateReport('季')">一季度總結</div>
            <div class="picker-option" onclick="generateReport('年')">年度戀愛大賞</div>
        </div>
    </div>

    <script>
        // --- 1. 基礎配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyDvzd2ZhT-HfuJoJ28S14cun-6D_wNILtg",
            authDomain: "ourloveplanner.firebaseapp.com",
            databaseURL: "https://ourloveplanner-default-rtdb.firebaseio.com",
            projectId: "ourloveplanner",
            storageBucket: "ourloveplanner.firebasestorage.app",
            messagingSenderId: "671815155990",
            appId: "1:671815155990:web:ce0adcdd59f1778cb41037"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = '';
        let lastAction = null; // 撤回專用
        let dragItem = null;
        const startDate = new Date('2024-09-18');
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        // --- 2. 初始化身分 ---
        function initApp(user) {
            currentUser = user;
            document.getElementById('login-screen').style.display = 'none';
            document.documentElement.style.setProperty('--accent', user === 'ysc' ? 'var(--ysc-blue)' : 'var(--lcl-pink)');
            
            // 計算在一起天數
            const now = new Date();
            const diffTime = Math.abs(now - startDate);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            document.getElementById('days-display').innerText = `在一起 ${diffDays} 日`;

            startListening();
        }

        function switchView(view, btn) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + view).classList.add('active');
            btn.classList.add('active');
            if(view === 'chat') {
                const win = document.getElementById('chat-window');
                win.scrollTop = win.scrollHeight;
            }
        }

        // --- 3. 數據監聽與渲染 ---
        function startListening() {
            db.ref('loveplan').on('value', (snapshot) => {
                const data = snapshot.val() || {};
                renderCalendar(data.calendar || {});
                renderReminders(data.reminders || {});
                renderPlans(data.plans || {});
                renderChat(data.chats || {});
                renderHistory(data.history || {});
                calculateHappiness(data.calendar || {});
            });
        }

        // 幸福指數：(love - bomb) / 7 (過去30日)
        function calculateHappiness(cal) {
            let love = 0, bomb = 0;
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);

            Object.entries(cal).forEach(([dateStr, events]) => {
                const d = new Date(dateStr);
                if (d >= thirtyDaysAgo) {
                    Object.values(events).forEach(e => {
                        if (e === '❤️') love++;
                        if (e === '💣') bomb++;
                    });
                }
            });
            const index = ((love - bomb) / 7).toFixed(1);
            document.getElementById('happiness-display').innerText = `我們的幸福指數：${index}`;
        }

        // --- 4. 日曆功能 ---
        function renderCalendar(calData) {
            const grid = document.getElementById('calendar-grid-body');
            grid.innerHTML = '';
            const today = new Date();
            const startDay = new Date(today);
            startDay.setDate(today.getDate() - today.getDay()); // 本周日

            // 渲染未來 5 週
            for (let i = 0; i < 35; i++) {
                const d = new Date(startDay);
                d.setDate(startDay.getDate() + i);
                const dateKey = d.toISOString().split('T')[0];
                const isPast = d < new Date(today.setHours(0,0,0,0));

                const cell = document.createElement('div');
                cell.className = `cal-day ${isPast ? 'past' : ''}`;
                cell.innerHTML = `<span class="day-label">${d.getDate()}/${months[d.getMonth()]}</span>`;
                
                if (!isPast) {
                    cell.onclick = (e) => {
                        if(e.target === cell) {
                            const event = prompt("添加事件：");
                            if(event) updateDB(`calendar/${dateKey}`, event, "添加日曆事件");
                        }
                    };
                    cell.ondragover = allowDrop;
                    cell.ondrop = (e) => dropToCalendar(e, dateKey);
                }

                if (calData[dateKey]) {
                    Object.entries(calData[dateKey]).forEach(([eid, etxt]) => {
                        const tag = document.createElement('div');
                        tag.className = 'event-tag';
                        tag.innerText = etxt;
                        tag.draggable = true;
                        tag.ondragstart = () => { dragItem = { type: 'cal', date: dateKey, id: eid, val: etxt }; document.getElementById('trash-bar').classList.add('active'); };
                        tag.ondragend = () => document.getElementById('trash-bar').classList.remove('active');
                        cell.appendChild(tag);
                    });
                }
                grid.appendChild(cell);
            }
        }

        // --- 5. 提醒與計劃 ---
        function sendReminder() {
            const inp = document.getElementById('remind-input-field');
            if(!inp.value) return;
            const path = `reminders/${currentUser === 'ysc' ? 'lcl' : 'ysc'}`;
            db.ref('loveplan/' + path).push({ text: inp.value, from: currentUser, time: Date.now() });
            saveSnapshot(`發送提醒`);
            inp.value = '';
        }

        function renderReminders(rems) {
            const area = document.getElementById('remind-display-area');
            area.innerHTML = '';
            const myRems = rems[currentUser] || {};
            Object.entries(myRems).forEach(([id, r]) => {
                const div = document.createElement('div');
                div.className = 'remind-item';
                div.innerHTML = `<span>💌 ${r.text}</span><button onclick="readReminder('${id}', '${r.text}')">✅</button>`;
                area.appendChild(div);
            });
        }

        function readReminder(id, txt) {
            saveSnapshot(`已讀提醒：${txt}`);
            db.ref(`loveplan/reminders/${currentUser}/${id}`).remove();
            addToHistory(`已讀對方提醒：${txt}`);
        }

        function addPlan(cat) {
            const inp = document.getElementById('in-' + cat);
            if(!inp.value) return;
            updateDB(`plans/${cat}`, inp.value, `添加計劃：${inp.value}`);
            inp.value = '';
        }

        function renderPlans(plans) {
            ['eat', 'go', 'do'].forEach(cat => {
                const container = document.getElementById('list-' + cat);
                container.innerHTML = '';
                const items = plans[cat] || {};
                Object.entries(items).forEach(([id, val]) => {
                    const tag = document.createElement('div');
                    tag.className = 'event-tag';
                    tag.innerText = val;
                    tag.draggable = true;
                    tag.ondragstart = () => { dragItem = { type: 'plan', cat, id, val }; document.getElementById('trash-bar').classList.add('active'); };
                    tag.ondragend = () => document.getElementById('trash-bar').classList.remove('active');
                    container.appendChild(tag);
                });
            });
        }

        // --- 6. 通訊系統 ---
        function sendChatMessage() {
            const inp = document.getElementById('chat-msg-input');
            if(!inp.value) return;
            const msg = { text: inp.value, by: currentUser, time: Date.now() };
            db.ref('loveplan/chats').push(msg);
            saveSnapshot(`發送訊息`);
            inp.value = '';
        }

        function handleImage(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                db.ref('loveplan/chats').push({ image: e.target.result, by: currentUser, time: Date.now() });
                saveSnapshot(`發送照片`);
            };
            reader.readAsDataURL(file);
        }

        function renderChat(chats) {
            const win = document.getElementById('chat-window');
            win.innerHTML = '';
            Object.entries(chats).forEach(([id, m]) => {
                const row = document.createElement('div');
                row.className = `msg-wrap ${m.by === currentUser ? 'me' : 'other'}`;
                const time = new Date(m.time).toLocaleString();
                
                let content = m.text ? `<div>${m.text}</div>` : `<img src="${m.image}" class="chat-img">`;
                row.innerHTML = `<div class="bubble">${content}</div><div class="msg-time">${time}</div>`;
                
                row.oncontextmenu = (e) => {
                    e.preventDefault();
                    if(confirm("撤回這條消息？")) {
                        saveSnapshot(`撤回消息`);
                        db.ref(`loveplan/chats/${id}`).remove();
                    }
                };
                win.appendChild(row);
            });
            win.scrollTop = win.scrollHeight;
        }

        // --- 7. 拖拽與撤回核心 ---
        function allowDrop(e) { e.preventDefault(); }

        function dropToCalendar(e, date) {
            e.preventDefault();
            if(!dragItem) return;
            saveSnapshot(`移動事件到 ${date}`);
            
            // 1. 刪除原處
            if(dragItem.type === 'cal') db.ref(`loveplan/calendar/${dragItem.date}/${dragItem.id}`).remove();
            else db.ref(`loveplan/plans/${dragItem.cat}/${dragItem.id}`).remove();
            
            // 2. 增加到新處
            db.ref(`loveplan/calendar/${date}`).push(dragItem.val);
        }

        function dropToPlan(e, cat) {
            e.preventDefault();
            if(!dragItem) return;
            saveSnapshot(`拖回計劃列表`);
            if(dragItem.type === 'cal') db.ref(`loveplan/calendar/${dragItem.date}/${dragItem.id}`).remove();
            else db.ref(`loveplan/plans/${dragItem.cat}/${dragItem.id}`).remove();
            db.ref(`loveplan/plans/${cat}`).push(dragItem.val);
        }

        document.getElementById('trash-bar').ondrop = (e) => {
            e.preventDefault();
            if(!dragItem) return;
            saveSnapshot(`刪除操作`);
            if(dragItem.type === 'cal') db.ref(`loveplan/calendar/${dragItem.date}/${dragItem.id}`).remove();
            else db.ref(`loveplan/plans/${dragItem.cat}/${dragItem.id}`).remove();
            document.getElementById('trash-bar').classList.remove('active');
        };

        // --- 8. 撤回與歷史 ---
        function saveSnapshot(msg) {
            db.ref('loveplan').once('value', s => {
                lastAction = { data: s.val(), msg: msg };
            });
        }

        function undoAction() {
            if(!lastAction) { alert("沒有可撤回的操作"); return; }
            db.ref('loveplan').set(lastAction.data);
            alert(`已撤回：${lastAction.msg}`);
            lastAction = null;
        }

        function updateDB(path, val, msg) {
            saveSnapshot(msg);
            db.ref('loveplan/' + path).push(val);
            addToHistory(msg);
        }

        function addToHistory(text) {
            const now = new Date();
            const timeStr = `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 ${now.getHours()}:${now.getMinutes()}`;
            db.ref('loveplan/history').push({ text, time: timeStr });
        }

        function renderHistory(hist) {
            const area = document.getElementById('history-render-area');
            area.innerHTML = '';
            Object.entries(hist).reverse().forEach(([id, h]) => {
                const div = document.createElement('div');
                div.className = 'history-card';
                div.innerHTML = `<div>${h.text}</div><div class="msg-time">${h.time}</div><span class="del-hist" onclick="delHist('${id}')">🗑️</span>`;
                area.appendChild(div);
            });
        }

        function delHist(id) {
            if(confirm("刪除這條記錄？")) db.ref(`loveplan/history/${id}`).remove();
        }

        // --- 9. Gemini 報告與其它 ---
        function togglePicker() {
            const el = document.getElementById('picker-overlay');
            el.style.display = el.style.display === 'flex' ? 'none' : 'flex';
        }

        function generateReport(scale) {
            alert(`正在打包 ${scale} 數據並交給 Gemini 生成報告...請稍候`);
            togglePicker();
        }

        function quickAddLove() {
            const todayKey = new Date().toISOString().split('T')[0];
            updateDB(`calendar/${todayKey}`, "❤️", "點擊添加愛心");
        }
    </script>
</body>
</html>
