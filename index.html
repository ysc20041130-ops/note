<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Love Story</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        :root {
            --ysc-blue: #7A91B1;
            --lcl-pink: #FFB6C1;
            --bg-soft-pink: #FFF0F5;
            --white: #ffffff;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --current-theme: #7A91B1;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0; padding: 0;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            background-color: var(--bg-soft-pink);
            color: #4A4A4A;
            overflow-x: hidden;
        }

        /* --- 身份選擇頁面 --- */
        #page-login {
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            height: 100vh; background-color: var(--bg-soft-pink);
        }
        .login-prompt { font-size: 1.4rem; margin-bottom: 40px; color: #777; font-weight: 300; }
        .btn-identity {
            width: 260px; padding: 18px; margin: 12px 0; border: none; border-radius: 50px;
            font-size: 1.1rem; color: white; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: var(--transition-smooth);
        }
        .btn-identity:active { transform: scale(0.95); }
        .id-ysc { background-color: var(--ysc-blue); }
        .id-lcl { background-color: var(--lcl-pink); }

        /* --- 全局 UI 元件 --- */
        #undo-btn {
            position: fixed; top: 15px; right: 15px; z-index: 9999;
            padding: 10px 20px; background: white; border: 2px solid #eee;
            border-radius: 25px; cursor: pointer; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); transition: var(--transition-smooth);
        }
        #undo-btn:hover { background: #fdfdfd; transform: translateY(-2px); }

        .nav-header {
            display: flex; background: white; padding-top: 60px;
            position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.03);
        }
        .nav-item {
            flex: 1; text-align: center; padding: 18px 0; cursor: pointer;
            font-weight: bold; color: #BBB; transition: var(--transition-smooth);
        }
        .nav-item.active { color: #444; border-bottom: 4px solid var(--current-theme); }

        /* --- 佈局容器 --- */
        .main-container {
            max-width: 1200px; margin: 0 auto; padding: 20px;
            display: grid; grid-template-columns: 1fr; gap: 25px;
        }
        @media (min-width: 992px) {
            .main-container { grid-template-columns: 1fr 1fr; }
            .wide-card { grid-column: span 2; }
        }
        .card {
            background: white; border-radius: 28px; padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.02); position: relative;
        }

        /* --- 紀念日曆模塊 --- */
        .happiness-info { line-height: 1.6; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 20px; }
        .cal-cell {
            min-height: 120px; background: #fff; border: 1px solid #f0f0f0;
            border-radius: 15px; padding: 8px; font-size: 0.8rem; transition: background 0.2s;
        }
        .cal-cell.past { background-color: #f7f7f7; color: #ccc; pointer-events: none; }
        .cell-date { font-weight: bold; color: #888; margin-bottom: 8px; }
        .event-chip {
            background: #fdf2f2; font-size: 0.75rem; padding: 5px 10px; margin-bottom: 5px;
            border-radius: 8px; cursor: grab; border-left: 4px solid var(--current-theme);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }

        /* --- 全屏右側垃圾桶 --- */
        #trash-sidebar {
            position: fixed; right: -160px; top: 0; width: 140px; height: 100vh;
            background: #FF5E5E; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: right 0.4s ease;
            z-index: 2000; writing-mode: vertical-rl; font-size: 1.3rem; letter-spacing: 6px;
        }
        #trash-sidebar.active { right: 0; box-shadow: -10px 0 30px rgba(255,94,94,0.3); }

        /* --- 未來計劃 --- */
        .plan-section { margin-top: 15px; }
        .plan-dropzone {
            min-height: 100px; background: #fafafa; border: 2px dashed #eee;
            border-radius: 20px; padding: 15px; display: flex; flex-wrap: wrap; gap: 10px;
        }
        .plan-input-group { display: flex; gap: 10px; margin-top: 10px; }
        .plan-input-group input {
            flex: 1; padding: 12px 20px; border-radius: 15px; border: 1px solid #eee; outline: none;
        }

        /* --- 寶寶通訊 (Instagram Style) --- */
        .chat-view { height: 600px; display: flex; flex-direction: column; }
        .chat-body { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .chat-bubble {
            max-width: 75%; padding: 12px 18px; border-radius: 22px; font-size: 0.95rem; line-height: 1.5;
            position: relative; word-wrap: break-word;
        }
        .chat-bubble.right { align-self: flex-end; background-color: #E3F2FD; border-bottom-right-radius: 5px; }
        .chat-bubble.left { align-self: flex-start; background-color: #F1F1F1; border-bottom-left-radius: 5px; }
        .chat-meta { display: block; font-size: 0.65rem; color: #AAA; margin-top: 6px; }

        .chat-input-bar {
            display: flex; align-items: center; padding: 15px; gap: 12px; border-top: 1px solid #F5F5F5;
        }
        .chat-input-bar input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #EEE; outline: none; }
        .btn-send-green { background-color: #2ECC71; color: white; border: none; padding: 10px 22px; border-radius: 25px; cursor: pointer; }

        /* --- 歷史紀錄 --- */
        .history-list { display: flex; flex-direction: column; gap: 10px; }
        .history-item {
            padding: 18px; background: #FFF; border-bottom: 1px solid #F9F9F9;
            display: flex; justify-content: space-between; align-items: center;
        }
        .history-del-btn { color: #FF5E5E; cursor: pointer; font-size: 1.2rem; padding: 5px; }
        .rainbow-btn {
            background: linear-gradient(90deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb, #ff9a9e);
            background-size: 200%; border: none; padding: 20px; border-radius: 40px; color: white;
            font-weight: bold; width: 100%; cursor: pointer; margin-top: 30px;
            animation: rainbow-flow 5s linear infinite;
        }
        @keyframes rainbow-flow { 0% { background-position: 0% 50%; } 100% { background-position: 200% 50%; } }
    </style>
</head>
<body>

<button id="undo-btn" onclick="performUndo()">↩️ 撤回操作</button>

<div id="page-login">
    <div class="login-prompt">和你的Love Story</div>
    <button class="btn-identity id-ysc" onclick="initUser('ysc')">我是ysc</button>
    <button class="btn-identity id-lcl" onclick="initUser('lcl')">我是lcl</button>
</div>

<div id="page-main" style="display:none;">
    <nav class="nav-header" id="nav-header">
        <div class="nav-item active" onclick="switchView('calendar')">紀念日曆</div>
        <div class="nav-item" onclick="switchView('chat')">寶寶通訊</div>
        <div class="nav-item" onclick="switchView('history')">歷史紀錄</div>
    </nav>

    <div id="view-calendar" class="main-container">
        <div class="card">
            <div class="happiness-info">
                <h2 id="days-counter" style="margin:0;">在一起 0 日</h2>
                <div id="happiness-index" style="font-weight: bold; color: #555;">我們的幸福指數：0</div>
            </div>
            <button id="btn-checkin" class="btn-identity" style="width:100%; margin-top:20px;">打卡認證</button>
        </div>

        <div class="card">
            <h3>給對方的小提醒</h3>
            <div id="reminder-display-zone" style="min-height: 50px; margin-bottom: 15px;"></div>
            <div class="plan-input-group">
                <input type="text" id="reminder-input" placeholder="填入的提示僅對方可見">
                <button onclick="postReminder()" class="btn-identity" style="width:auto; padding:0 30px;">發送</button>
            </div>
        </div>

        <div class="card wide-card">
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <h3 style="margin:0;">小日曆</h3>
                <button onclick="quickAddLove()" style="background:white; border:1px solid #ddd; padding:8px 18px; border-radius:10px; cursor:pointer;">➕ ❤️</button>
            </div>
            <div class="calendar-grid" id="calendar-body"></div>
        </div>

        <div class="card wide-card">
            <h3>未來計劃</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                <div class="plan-section">
                    <label>🍩 豬癮犯了 (想吃的)</label>
                    <div id="plan-eat" class="plan-dropzone" data-type="eat"></div>
                    <div class="plan-input-group"><input type="text" onkeypress="handlePlanEnter(event, 'eat')" placeholder="添加內容..."></div>
                </div>
                <div class="plan-section">
                    <label>👣 腳好累呀 (想去的)</label>
                    <div id="plan-go" class="plan-dropzone" data-type="go"></div>
                    <div class="plan-input-group"><input type="text" onkeypress="handlePlanEnter(event, 'go')" placeholder="添加內容..."></div>
                </div>
                <div class="plan-section">
                    <label>🎮 好無聊呀 (想做的)</label>
                    <div id="plan-do" class="plan-dropzone" data-type="do"></div>
                    <div class="plan-input-group"><input type="text" onkeypress="handlePlanEnter(event, 'do')" placeholder="添加內容..."></div>
                </div>
            </div>
        </div>
    </div>

    <div id="view-chat" class="main-container" style="display:none;">
        <div class="card wide-card chat-view">
            <div class="chat-body" id="chat-scroller"></div>
            <div class="chat-input-bar">
                <button style="background:none; border:none; font-size:1.6rem; cursor:pointer;">📷</button>
                <input type="text" id="chat-input-msg" placeholder="輸入訊息...">
                <button class="btn-send-green" onclick="submitChatMessage()">送出</button>
            </div>
        </div>
    </div>

    <div id="view-history" class="main-container" style="display:none;">
        <div class="card wide-card" style="padding:0;">
            <div id="history-scroller" class="history-list"></div>
        </div>
        <div class="wide-card">
            <button class="rainbow-btn" onclick="generateLoveReport()">交給Gemini 生成我們的戀愛報告</button>
        </div>
    </div>
</div>

<div id="trash-sidebar">🗑️ 拖 到 此 處 刪 除</div>

<script>
// ==========================================
// 1. 初始化與數據定義
// ==========================================
const firebaseConfig = {
    apiKey: "AIzaSyDvzd2ZhT-HfuJoJ28S14cun-6D_wNILtg",
    authDomain: "ourloveplanner.firebaseapp.com",
    databaseURL: "https://ourloveplanner-default-rtdb.firebaseio.com",
    projectId: "ourloveplanner",
    storageBucket: "ourloveplanner.firebasestorage.app",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let user = ""; 
let undoStack = [];
const LOVE_START = new Date('2024-09-18');

// ==========================================
// 2. 核心 UI 切換與身份
// ==========================================
function initUser(id) {
    user = id;
    const themeColor = id === 'ysc' ? 'var(--ysc-blue)' : 'var(--lcl-pink)';
    document.documentElement.style.setProperty('--current-theme', themeColor);
    
    document.getElementById('page-login').style.display = 'none';
    document.getElementById('page-main').style.display = 'block';
    
    document.querySelectorAll('.btn-identity').forEach(btn => btn.style.backgroundColor = themeColor);
    document.querySelector('.nav-item.active').style.borderBottomColor = themeColor;
    
    startApp();
}

function switchView(v) {
    const views = ['calendar', 'chat', 'history'];
    views.forEach(view => document.getElementById(`view-${view}`).style.display = (view === v) ? 'grid' : 'none');
    document.querySelectorAll('.nav-item').forEach(it => {
        it.classList.remove('active');
        if(it.innerText.includes(v === 'calendar' ? '紀念日曆' : v === 'chat' ? '寶寶通訊' : '歷史紀錄')) it.classList.add('active');
    });
}

// ==========================================
// 3. 撤回與歷史追蹤
// ==========================================
function pushToUndo(actionName, path, prevData, type = 'set') {
    undoStack.push({ actionName, path, prevData, type });
}

async function performUndo() {
    if (undoStack.length === 0) {
        alert("沒有可撤回的操作");
        return;
    }
    const last = undoStack.pop();
    try {
        if(last.type === 'set') {
            await db.ref(last.path).set(last.prevData);
        } else if(last.type === 'push') {
            await db.ref(last.path).remove();
        }
        alert(`已撤回：${last.actionName}`);
    } catch(e) { console.error(e); }
}

function recordHistory(msg, category = 'system') {
    const ref = db.ref('history_logs').push();
    ref.set({
        msg, user, category,
        time: new Date().toLocaleString('zh-TW', {hour12: false}),
        ts: firebase.database.ServerValue.TIMESTAMP
    });
}

// ==========================================
// 4. 日曆引擎 (核心邏輯)
// ==========================================
function renderCalendar() {
    const grid = document.getElementById('calendar-body');
    grid.innerHTML = "";
    const headers = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    headers.forEach(h => grid.innerHTML += `<div style="text-align:center; font-weight:bold; color:#999; font-size:0.75rem;">${h}</div>`);

    let dateCursor = new Date();
    dateCursor.setDate(dateCursor.getDate() - dateCursor.getDay());

    for (let i = 0; i < 35; i++) {
        const dStr = dateCursor.toISOString().split('T')[0];
        const isPast = new Date(new Date(dateCursor).setHours(0,0,0,0)) < new Date().setHours(0,0,0,0);
        
        const cell = document.createElement('div');
        cell.className = `cal-cell ${isPast ? 'past' : ''}`;
        cell.dataset.date = dStr;
        cell.innerHTML = `<div class="cell-date">${dateCursor.getDate()}/${dateCursor.toLocaleString('en-US', {month:'short'})}</div>`;

        if (!isPast) {
            cell.onclick = (e) => {
                if (e.target === cell) {
                    const txt = prompt("添加今天的小事：");
                    if (txt) addEvent(dStr, txt);
                }
            };
            initDrag(cell);
        }
        grid.appendChild(cell);
        dateCursor.setDate(dateCursor.getDate() + 1);
    }
}

function initDrag(el) {
    new Sortable(el, {
        group: 'love-events',
        animation: 150,
        onStart: () => document.getElementById('trash-sidebar').classList.add('active'),
        onEnd: () => document.getElementById('trash-sidebar').classList.remove('active'),
        onAdd: async (evt) => {
            const text = evt.item.innerText;
            const targetDate = evt.to.dataset.date;
            const targetPlan = evt.to.dataset.type;
            
            if (targetDate) addEvent(targetDate, text);
            else if (targetPlan) addPlan(targetPlan, text);
            
            evt.item.remove(); // 依託數據驅動重新渲染
        }
    });
}

async function addEvent(date, text) {
    const ref = db.ref(`events/${date}`).push();
    await ref.set({ text, user, ts: Date.now() });
    pushToUndo('添加日曆事件', `events/${date}/${ref.key}`, null, 'push');
    // 注意：歷史紀錄僅在每日最後一秒由邏輯統一處理，或此處手動模擬
}

// 模擬「每日最後一秒上傳日曆事件到歷史」
function simulateEndOfDaySync() {
    // 監測當日所有事件並歸檔
}

// ==========================================
// 5. 幸福指數與打卡
// ==========================================
async function calculateHappiness(events, checkins) {
    let love = 0, bomb = 0, sign = 0;
    const now = Date.now();
    const thirtyDays = 30 * 24 * 60 * 60 * 1000;

    if (events) {
        Object.keys(events).forEach(d => {
            Object.values(events[d]).forEach(e => {
                if (now - e.ts < thirtyDays) {
                    if (e.text.includes('❤️')) love++;
                    if (e.text.includes('💣')) bomb++;
                }
            });
        });
    }

    if (checkins) {
        Object.values(checkins).forEach(u => {
            Object.values(u).forEach(s => {
                if (now - s.ts < thirtyDays) sign++;
            });
        });
    }

    const total = (love - bomb) * 7 + sign;
    document.getElementById('happiness-index').innerText = `我們的幸福指數：${total}`;
}

async function handleCheckIn() {
    const today = new Date().toISOString().split('T')[0];
    const ref = db.ref(`checkins/${user}/${today}`);
    const snap = await ref.once('value');

    if (snap.exists()) {
        alert("提示今天已經打過卡啦");
        return;
    }

    await ref.set({ ts: Date.now() });
    recordHistory("完成了每日打卡認證", "checkin");
    alert("打卡成功！");
}

// ==========================================
// 6. 通訊與計畫
// ==========================================
function submitChatMessage() {
    const input = document.getElementById('chat-input-msg');
    if (!input.value.trim()) return;

    const ref = db.ref('messages').push();
    ref.set({
        u: user,
        t: input.value,
        time: new Date().toLocaleString('zh-TW', { hour12: false }),
        ts: firebase.database.ServerValue.TIMESTAMP
    });
    input.value = "";
}

function handlePlanEnter(e, type) {
    if (e.key === 'Enter' && e.target.value.trim()) {
        addPlan(type, e.target.value);
        e.target.value = "";
    }
}

async function addPlan(type, text) {
    const ref = db.ref(`plans/${type}`).push();
    await ref.set({ text, user, ts: Date.now() });
    pushToUndo('添加未來計劃', `plans/${type}/${ref.key}`, null, 'push');
}

async function postReminder() {
    const input = document.getElementById('reminder-input');
    const target = user === 'ysc' ? 'lcl' : 'ysc';
    if (!input.value.trim()) return;

    const ref = db.ref(`reminders/${target}`).push();
    await ref.set({ text: input.value, from: user, ts: Date.now() });
    input.value = "";
    alert("提醒已送達對方（你自己現在看不見囉）");
}

async function solveReminder(key, text) {
    const ref = db.ref(`reminders/${user}/${key}`);
    await ref.remove();
    recordHistory(`完成了小提醒：${text}`, "reminder");
    alert("已讀並歸檔至歷史紀錄");
}

// ==========================================
// 7. 啟動與實時監聽
// ==========================================
function startApp() {
    // 1. 在一起時間
    const diff = Math.floor((new Date() - LOVE_START) / 86400000) + 1;
    document.getElementById('days-counter').innerText = `在一起 ${diff} 日`;

    // 2. 初始化組件
    renderCalendar();
    ['eat', 'go', 'do'].forEach(t => initDrag(document.getElementById(`plan-${t}`)));
    new Sortable(document.getElementById('trash-sidebar'), { group: 'love-events', onAdd: (e) => e.item.remove() });

    // 3. 數據監聽
    db.ref('events').on('value', snap => {
        const data = snap.val() || {};
        refreshCalendarUI(data);
        db.ref('checkins').once('value', s => calculateHappiness(data, s.val()));
    });

    ['eat', 'go', 'do'].forEach(type => {
        db.ref(`plans/${type}`).on('value', snap => renderPlanUI(type, snap.val()));
    });

    db.ref(`reminders/${user}`).on('value', snap => {
        const zone = document.getElementById('reminder-display-zone');
        zone.innerHTML = "";
        const data = snap.val();
        if(data) {
            Object.keys(data).forEach(k => {
                const r = data[k];
                zone.innerHTML += `
                    <div style="background:#FFF9FA; padding:12px; border-radius:12px; border:1px solid #FFE4E1; display:flex; justify-content:space-between; align-items:center;">
                        <span>${r.text}</span>
                        <button onclick="solveReminder('${k}', '${r.text}')" style="background:none; border:none; cursor:pointer;">✅</button>
                    </div>`;
            });
        } else { zone.innerHTML = `<span style="color:#CCC; font-style:italic;">暫無提醒</span>`; }
    });

    db.ref('messages').limitToLast(50).on('value', snap => {
        const scroller = document.getElementById('chat-scroller');
        scroller.innerHTML = "";
        const data = snap.val();
        if(data) {
            Object.values(data).forEach(m => {
                scroller.innerHTML += `
                    <div class="chat-bubble ${m.u === user ? 'right' : 'left'}">
                        ${m.t}<span class="chat-meta">${m.time}</span>
                    </div>`;
            });
            scroller.scrollTop = scroller.scrollHeight;
        }
    });

    db.ref('history_logs').on('value', snap => {
        const scroller = document.getElementById('history-scroller');
        scroller.innerHTML = "";
        const data = snap.val();
        if(data) {
            Object.keys(data).reverse().forEach(k => {
                const h = data[k];
                scroller.innerHTML += `
                    <div class="history-item">
                        <div>
                            <div style="font-weight:bold;">${h.msg}</div>
                            <div style="font-size:0.75rem; color:#AAA;">${h.time} (${h.user})</div>
                        </div>
                        <div class="history-del-btn" onclick="deleteHistory('${k}')">🗑️</div>
                    </div>`;
            });
        }
    });

    document.getElementById('btn-checkin').onclick = handleCheckIn;
}

function refreshCalendarUI(data) {
    document.querySelectorAll('.cal-cell').forEach(cell => {
        const date = cell.dataset.date;
        cell.querySelectorAll('.event-chip').forEach(c => c.remove());
        if(data[date]) {
            Object.values(data[date]).forEach(ev => {
                const chip = document.createElement('div');
                chip.className = 'event-chip';
                chip.innerText = ev.text;
                cell.appendChild(chip);
            });
        }
    });
}

function renderPlanUI(type, data) {
    const box = document.getElementById(`plan-${type}`);
    box.innerHTML = "";
    if(data) {
        Object.values(data).forEach(p => {
            const chip = document.createElement('div');
            chip.className = 'event-chip';
            chip.innerText = p.text;
            box.appendChild(chip);
        });
    }
}

async function deleteHistory(key) {
