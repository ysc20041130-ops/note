<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Our Love Story</title>

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-storage-compat.js"></script>

    <style>
        /* * ============================================================
         * 1. 全域樣式與變數 (Design System)
         * ============================================================
         */
        :root {
            --ysc-main: #607d8b;
            --lcl-main: #ffafbd;
            --bg-pink: #fff0f3;
            --white: #ffffff;
            --gray-text: #666666;
            --danger: #ff5252;
            --success: #4caf50;
            --shadow: 0 15px 45px rgba(0,0,0,0.08);
            --radius-lg: 35px;
            --radius-md: 20px;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: "PingFang HK", "Heiti TC", "Microsoft JhengHei", sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-pink);
            color: #333;
            width: 100vw; height: 100vh;
            overflow: hidden;
            position: fixed;
        }

        /* * ============================================================
         * 2. 身分選擇頁面 (Portal View)
         * ============================================================
         */
        #portal-view {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-pink); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .portal-title {
            font-size: 2.2rem; font-weight: 300; letter-spacing: 12px;
            color: #888; margin-bottom: 80px;
        }

        .btn-portal {
            width: 320px; padding: 30px; margin: 20px; border: none;
            border-radius: 60px; font-size: 1.6rem; font-weight: 900;
            cursor: pointer; transition: 0.3s; box-shadow: var(--shadow);
            color: white;
        }

        .btn-ysc { background-color: var(--ysc-main); }
        .btn-lcl { background-color: var(--lcl-main); }
        .btn-portal:active { transform: scale(0.95); }

        /* * ============================================================
         * 3. 頂部導航與撤回按鈕 (Header & Undo)
         * ============================================================
         */
        #main-shell { display: none; flex-direction: column; height: 100vh; }

        header {
            background: rgba(255,255,255,0.9); backdrop-filter: blur(20px);
            padding: 20px 0; border-bottom: 1px solid rgba(0,0,0,0.05);
            z-index: 2000; position: relative;
        }

        .nav-tabs { display: flex; justify-content: center; gap: 40px; }
        .nav-tab {
            font-size: 1.4rem; font-weight: 900; color: #ccc;
            cursor: pointer; border: none; background: none; transition: 0.3s;
        }
        .nav-tab.active { color: var(--theme-color); transform: scale(1.1); }

        /* ↩️ 撤回按鈕 */
        .btn-undo-float {
            position: absolute; right: 25px; top: 20px;
            background: white; border: 3px solid #eee; border-radius: 50%;
            width: 60px; height: 60px; font-size: 1.8rem;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: var(--shadow); transition: 0.3s;
            z-index: 2100;
        }
        .btn-undo-float:active { transform: rotate(-45deg) scale(0.9); }

        /* * ============================================================
         * 4. 佈局核心 (Layout Core)
         * ============================================================
         */
        .content-scroll { flex: 1; overflow-y: auto; padding: 25px; }
        .page-node { display: none; max-width: 1400px; margin: 0 auto; }
        .page-node.active { display: block; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .module-card {
            background: var(--white); border-radius: var(--radius-lg);
            padding: 40px; margin-bottom: 30px; box-shadow: var(--shadow);
            position: relative;
        }

        /* * ============================================================
         * 5. 紀念日曆模塊 (Calendar & Planner)
         * ============================================================
         */
        .stat-banner { text-align: center; padding: 20px 0; }
        .days-count { font-size: 4.8rem; font-weight: 900; color: var(--theme-color); }
        .score-text { font-size: 1.4rem; color: var(--gray-text); letter-spacing: 2px; margin: 15px 0; }
        
        .btn-punch {
            background: var(--theme-color); color: white; border: none;
            padding: 22px 120px; border-radius: 100px; font-size: 1.6rem;
            font-weight: 900; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        /* 日曆格網 */
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
        .cal-head { text-align: center; font-weight: 900; color: #bbb; padding: 15px 0; font-size: 1.1rem; }
        .cal-cell {
            background: #fff; border: 2px solid #f9f9f9; border-radius: 20px;
            min-height: 140px; padding: 12px; position: relative;
        }
        .cal-cell.disabled { background: #f0f0f0; opacity: 0.5; pointer-events: none; }
        .date-label { font-size: 1rem; font-weight: 900; color: #333; margin-bottom: 10px; display: block; }

        /* 事件標籤 */
        .event-tag {
            background: var(--theme-color); color: white; padding: 10px 15px;
            border-radius: 15px; font-size: 1rem; margin-top: 8px;
            cursor: grab; touch-action: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            word-break: break-all;
        }
        .event-tag:active { cursor: grabbing; opacity: 0.8; }

        /* ❤️ 快捷按鈕 */
        .btn-heart-quick {
            position: absolute; right: -30px; top: 150px;
            width: 80px; height: 80px; background: white; border: 4px solid var(--theme-color);
            border-radius: 50%; font-size: 2.5rem; display: flex; align-items: center;
            justify-content: center; cursor: pointer; z-index: 100; box-shadow: var(--shadow);
        }

        /* 🗑️ 垃圾桶側邊欄 */
        #trash-sidebar {
            position: fixed; top: 0; right: 0; width: 15px; height: 100%;
            background: rgba(255, 82, 82, 0.1); border-left: 2px dashed var(--danger);
            z-index: 3000; transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        #trash-sidebar.active { width: 120px; background: var(--danger); }
        .trash-label { 
            writing-mode: vertical-rl; color: white; font-weight: 900;
            font-size: 1.8rem; letter-spacing: 15px; opacity: 0;
        }
        #trash-sidebar.active .trash-label { opacity: 1; }

        /* 未來計劃適配 */
        .planner-container { display: flex; flex-direction: column; gap: 30px; }
        @media screen and (min-width: 1024px) {
            .planner-container { flex-direction: row; }
            .planner-container > div { flex: 1; }
        }
        .plan-box { background: #fafafa; border: 3px dashed #eee; border-radius: var(--radius-md); padding: 25px; }
        .plan-title { font-size: 1.3rem; font-weight: 900; margin-bottom: 15px; }
        .drop-zone { min-height: 120px; display: flex; flex-wrap: wrap; gap: 12px; padding: 15px; background: rgba(0,0,0,0.02); border-radius: 15px; }

        /* * ============================================================
         * 6. 寶寶通訊 (Messenger UI)
         * ============================================================
         */
        #chat-window { height: 65vh; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg-row { display: flex; width: 100%; }
        .msg-row.right { justify-content: flex-end; }
        .msg-row.left { justify-content: flex-start; }
        
        .bubble { 
            max-width: 75%; padding: 20px 25px; border-radius: 30px; font-size: 1.2rem; line-height: 1.6;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03); position: relative;
        }
        .right .bubble { background: var(--theme-color); color: white; border-bottom-right-radius: 5px; }
        .left .bubble { background: #fff; color: #333; border-bottom-left-radius: 5px; }
        .msg-meta { display: block; font-size: 0.75rem; opacity: 0.5; margin-top: 8px; }

        .chat-footer { display: flex; align-items: center; gap: 15px; padding: 25px; border-top: 1px solid #eee; }
        .chat-input { flex: 1; background: #f5f5f5; border: none; padding: 20px 30px; border-radius: 50px; font-size: 1.2rem; outline: none; }
        .btn-media { font-size: 2.2rem; cursor: pointer; color: #888; }
        .btn-send { background: var(--success); color: white; border: none; padding: 18px 40px; border-radius: 50px; font-weight: 900; cursor: pointer; }

        /* * ============================================================
         * 7. 歷史紀錄與 Gemini 按鈕
         * ============================================================
         */
        .history-item { padding: 25px; border-bottom: 1.5px solid #f8f8f8; display: flex; justify-content: space-between; align-items: center; }
        .btn-gemini {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%);
            color: white; border: none; padding: 25px 50px; border-radius: 100px;
            font-size: 1.3rem; font-weight: 900; cursor: pointer; box-shadow: 0 10px 40px rgba(245, 87, 108, 0.4);
            z-index: 1000;
        }

        /* 通知氣泡 */
        #toast-box {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); color: white; padding: 22px 60px;
            border-radius: 100px; z-index: 10000; transition: top 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            font-weight: 900;
        }
        #toast-box.show { top: 40px; }

    </style>
</head>
<body>

    <div id="portal-view">
        <h1 class="portal-title">和你的Love Story</h1>
        <button class="btn-portal btn-ysc" onclick="initApp('ysc')">我是ysc</button>
        <button class="btn-portal btn-lcl" onclick="initApp('lcl')">我是lcl</button>
    </div>

    <div id="main-shell">
        <header>
            <div class="nav-tabs">
                <button class="nav-tab active" id="tab-cal" onclick="jump('cal')">紀念日曆</button>
                <button class="nav-tab" id="tab-chat" onclick="jump('chat')">寶寶通訊</button>
                <button class="nav-tab" id="tab-hist" onclick="jump('hist')">歷史紀錄</button>
            </div>
            <button class="btn-undo-float" onclick="executeUndo()">↩️</button>
        </header>

        <div id="trash-sidebar"><div class="trash-label">🗑️拖到此處刪除</div></div>
        <div id="toast-box">Notice</div>

        <main class="content-scroll">
            
            <section id="page-cal" class="page-node active">
                <div class="module-card stat-banner">
                    <h1 class="days-count" id="ui-days">0 DAYS</h1>
                    <p class="score-text" id="ui-score">我們的幸福指數：0</p>
                    <button class="btn-punch" onclick="actionPunch()">打卡</button>
                </div>

                <div class="module-card">
                    <h3 style="margin-bottom:20px;">📌 給對方的小提醒</h3>
                    <div id="reminders-to-me"></div>
                    <div style="display:flex; gap:15px; margin-top:20px;">
                        <input type="text" id="rem-input" class="chat-input" placeholder="填入的提示僅對方可見">
                        <button class="btn-send" onclick="actionPostReminder()" style="background:var(--theme-color)">發送</button>
                    </div>
                </div>

                <div class="module-card" style="padding: 20px;">
                    <button class="btn-heart-quick" onclick="actionQuickHeart()">❤️</button>
                    <div class="cal-grid">
                        <div class="cal-head">Sun</div><div class="cal-head">Mon</div><div class="cal-head">Tue</div>
                        <div class="cal-head">Wed</div><div class="cal-head">Thu</div><div class="cal-head">Fri</div><div class="cal-head">Sat</div>
                    </div>
                    <div id="cal-render" class="cal-grid"></div>
                </div>

                <div class="planner-container">
                    <div class="plan-box">
                        <div class="plan-title">🍔 豬癮犯了 (想吃)</div>
                        <div class="drop-zone" id="zone-eat"></div>
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <input type="text" id="in-eat" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;">
                            <button onclick="actionAddPlan('eat')">+</button>
                        </div>
                    </div>
                    <div class="plan-box">
                        <div class="plan-title">📍 腳好累呀 (想去)</div>
                        <div class="drop-zone" id="zone-go"></div>
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <input type="text" id="in-go" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;">
                            <button onclick="actionAddPlan('go')">+</button>
                        </div>
                    </div>
                    <div class="plan-box">
                        <div class="plan-title">✨ 好無聊呀 (想做)</div>
                        <div class="drop-zone" id="zone-do"></div>
                        <div style="display:flex; gap:10px; margin-top:15px;">
                            <input type="text" id="in-do" style="flex:1; padding:10px; border-radius:10px; border:1px solid #ddd;">
                            <button onclick="actionAddPlan('do')">+</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="page-chat" class="page-node">
                <div class="module-card" style="padding: 10px;">
                    <div id="chat-window"></div>
                    <div class="chat-footer">
                        <label class="btn-media">
                            🖼️ <input type="file" id="media-upload" style="display:none" accept="image/*">
                        </label>
                        <input type="text" id="msg-input" class="chat-input" placeholder="對寶寶說點什麼...">
                        <button class="btn-send" onclick="actionSendMessage()">送出</button>
                    </div>
                </div>
            </section>

            <section id="page-hist" class="page-node">
                <div class="module-card" style="padding: 0;" id="hist-render"></div>
                <button class="btn-gemini" onclick="alert('請選擇時間尺度進行報告生成...')">交給Gemini 生成我們的戀愛報告</button>
            </section>

        </main>
    </div>

    <script>
        /**
         * ============================================================
         * 1. 工程核心配置
         * ============================================================
         */
        const FB_CONFIG = {
            apiKey: "AIzaSyDvzd2ZhT-HfuJoJ28S14cun-6D_wNILtg",
            databaseURL: "https://ourloveplanner-default-rtdb.firebaseio.com",
            projectId: "ourloveplanner",
            storageBucket: "ourloveplanner.appspot.com",
            appId: "1:671815155990:web:ce0adcdd59f1778cb41037"
        };
        firebase.initializeApp(FB_CONFIG);
        const rdb = firebase.database();
        const fst = firebase.storage();

        let ME = '';
        let YOU = '';
        let UNDO_STACK = [];
        let DRAG_ITEM = null;
        const LOVE_START = new Date('2024-09-18');

        // 初始化身分
        function initApp(user) {
            ME = user;
            YOU = (user === 'ysc' ? 'lcl' : 'ysc');
            const theme = (user === 'ysc' ? 'var(--ysc-main)' : 'var(--lcl-main)');
            document.documentElement.style.setProperty('--theme-color', theme);
            
            document.getElementById('portal-view').style.display = 'none';
            document.getElementById('main-shell').style.display = 'flex';
            
            startRealtimeSync();
            initMediaHandling();
            runAutomationCheck();
        }

        function jump(target) {
            document.querySelectorAll('.page-node, .nav-tab').forEach(el => el.classList.remove('active'));
            document.getElementById('page-' + target).classList.add('active');
            document.getElementById('tab-' + target).classList.add('active');
        }

        /**
         * ============================================================
         * 2. 原子拖拽與物理系統 (Atomic Drag Engine)
         * ============================================================
         */
        function bindDrag(el, data) {
            el.onpointerdown = (e) => {
                e.stopPropagation();
                DRAG_ITEM = { ...data, element: el };
                el.style.opacity = '0.3';
                document.getElementById('trash-sidebar').classList.add('active');
                el.setPointerCapture(e.pointerId);
            };

            el.onpointermove = (e) => {
                if(!DRAG_ITEM) return;
                // 視覺隨動
            };

            el.onpointerup = async (e) => {
                if(!DRAG_ITEM) return;
                
                const trash = document.getElementById('trash-sidebar');
                const dropEl = document.elementFromPoint(e.clientX, e.clientY);
                
                const cell = dropEl ? dropEl.closest('.cal-cell') : null;
                const zone = dropEl ? dropEl.closest('.drop-zone') : null;
                const isTrash = dropEl ? dropEl.closest('#trash-sidebar') : null;

                const snap = await rdb.ref('love_v7').once('value');
                const dbState = snap.val() || {};

                // 備份用於撤回
                const originalState = JSON.parse(JSON.stringify(dbState));

                // 執行刪除舊位置 (原子性第一步)
                if(DRAG_ITEM.origin === 'cal') {
                    delete dbState.calendar[DRAG_ITEM.date][DRAG_ITEM.id];
                } else if(DRAG_ITEM.origin === 'zone') {
                    delete dbState.planner[DRAG_ITEM.cat][DRAG_ITEM.id];
                }

                let success = false;
                let actionDesc = "移動操作";

                if(isTrash) {
                    actionDesc = `刪除：${DRAG_ITEM.val}`;
                    success = true;
                }
                else if(cell && !cell.classList.contains('disabled')) {
                    const newDate = cell.dataset.date;
                    if(!dbState.calendar) dbState.calendar = {};
                    if(!dbState.calendar[newDate]) dbState.calendar[newDate] = {};
                    dbState.calendar[newDate][Date.now()] = DRAG_ITEM.val;
                    actionDesc = `移動 ${DRAG_ITEM.val} 到 ${newDate}`;
                    success = true;
                }
                else if(zone) {
                    const cat = zone.id.split('-')[1];
                    if(!dbState.planner) dbState.planner = {};
                    if(!dbState.planner[cat]) dbState.planner[cat] = {};
                    dbState.planner[cat][Date.now()] = DRAG_ITEM.val;
                    actionDesc = `移動 ${DRAG_ITEM.val} 到計畫`;
                    success = true;
                }

                if(success) {
                    await rdb.ref('love_v7').set(dbState);
                    pushUndo(() => rdb.ref('love_v7').set(originalState), actionDesc);
                } else {
                    // 彈回
                    rdb.ref('love_v7').set(originalState);
                }

                trash.classList.remove('active');
                DRAG_ITEM = null;
                el.style.opacity = '1';
            };
        }

        /**
         * ============================================================
         * 3. 撤回系統 (Undo Stack)
         * ============================================================
         */
        function pushUndo(undoFn, desc) {
            UNDO_STACK.push({ undo: undoFn, desc: desc });
        }

        async function executeUndo() {
            if(UNDO_STACK.length === 0) {
                showToast("沒有可撤回的操作");
                return;
            }
            const item = UNDO_STACK.pop();
            await item.undo();
            showToast(`已撤回：${item.desc}`);
        }

        /**
         * ============================================================
         * 4. 業務邏輯：打卡、提醒、日曆
         * ============================================================
         */
        async function actionPunch() {
            const iso = new Date().toISOString().split('T')[0];
            const snap = await rdb.ref(`love_v7/signs/${iso}/${ME}`).once('value');
            
            if(snap.exists()) {
                showToast("提示今天已經打過卡啦");
            } else {
                await rdb.ref(`love_v7/signs/${iso}/${ME}`).set(true);
                showToast("打卡成功，今天又是填滿愛的一天！");
                pushUndo(() => rdb.ref(`love_v7/signs/${iso}/${ME}`).remove(), "每日打卡");
            }
        }

        async function actionPostReminder() {
            const inp = document.getElementById('rem-input');
            if(!inp.value) return;
            const ref = rdb.ref(`love_v7/reminders/${YOU}`).push();
            const val = inp.value;
            await ref.set(val);
            inp.value = '';
            showToast("提醒已悄悄送達對方");
            pushUndo(() => ref.remove(), "發送提醒");
        }

        async function resolveRem(id, text) {
            const ts = new Date().toLocaleString();
            await rdb.ref(`love_v7/reminders/${ME}/${id}`).remove();
            const histRef = rdb.ref('love_v7/history').push();
            await histRef.set({ text: `完成提醒：${text}`, time: ts });
            
            pushUndo(async () => {
                await rdb.ref(`love_v7/reminders/${ME}/${id}`).set(text);
                await histRef.remove();
            }, "勾選提醒");
        }

        async function actionQuickHeart() {
            const iso = new Date().toISOString().split('T')[0];
            const ref = rdb.ref(`love_v7/calendar/${iso}`).push();
            await ref.set('❤️');
            pushUndo(() => ref.remove(), "添加愛心");
        }

        async function actionAddPlan(cat) {
            const inp = document.getElementById('in-' + cat);
            if(!inp.value) return;
            const ref = rdb.ref(`love_v7/planner/${cat}`).push();
            const val = inp.value;
            await ref.set(val);
            inp.value = '';
            pushUndo(() => ref.remove(), `新增計畫：${val}`);
        }

        /**
         * ============================================================
         * 5. 同步與渲染 (Realtime Sync & Render)
         * ============================================================
         */
        function startRealtimeSync() {
            rdb.ref('love_v7').on('value', snap => {
                const data = snap.val() || {};
                renderCalendar(data.calendar || {});
                renderPlanner(data.planner || {});
                renderReminders(data.reminders || {});
                renderChats(data.chats || {});
                renderHistory(data.history || {});
                updateDashboard(data);
            });
        }

        function renderCalendar(cal) {
            const container = document.getElementById('cal-render');
            container.innerHTML = '';
            
            const now = new Date(); now.setHours(0,0,0,0);
            const start = new Date(now);
            start.setDate(now.getDate() - now.getDay());

            for(let i=0; i<35; i++) {
                const day = new Date(start); day.setDate(start.getDate() + i);
                const iso = day.toISOString().split('T')[0];
                const isPast = day < now;

                const cell = document.createElement('div');
                cell.className = `cal-cell ${isPast ? 'disabled' : ''}`;
                cell.dataset.date = iso;
                
                const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
                cell.innerHTML = `<span class="date-label">${day.getDate()}/${months[day.getMonth()]}</span>`;

                if(cal[iso]) {
                    Object.entries(cal[iso]).forEach(([id, val]) => {
                        const tag = document.createElement('div');
                        tag.className = 'event-tag';
                        tag.innerText = val;
                        bindDrag(tag, { origin: 'cal', date: iso, id, val });
                        cell.appendChild(tag);
                    });
                }

                if(!isPast) {
                    cell.onclick = (e) => {
                        if(e.target === cell) {
                            const v = prompt("添加事件：");
                            if(v) rdb.ref(`love_v7/calendar/${iso}`).push(v);
                        }
                    };
                }
                container.appendChild(cell);
            }
        }

        function renderPlanner(plan) {
            ['eat','go','do'].forEach(c => {
                const zone = document.getElementById('zone-' + c);
                zone.innerHTML = '';
                if(plan[c]) {
                    Object.entries(plan[c]).forEach(([id, val]) => {
                        const tag = document.createElement('div');
                        tag.className = 'event-tag';
                        tag.innerText = val;
                        bindDrag(tag, { origin: 'zone', cat: c, id, val });
                        zone.appendChild(tag);
                    });
                }
            });
        }

        function renderReminders(rems) {
            const area = document.getElementById('reminders-to-me');
            area.innerHTML = '';
            const myRems = rems[ME] || {};
            Object.entries(myRems).forEach(([id, text]) => {
                const div = document.createElement('div');
                div.style = "padding:15px; background:#fff9fa; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; border:1px solid #ffeef0;";
                div.innerHTML = `<span>💌 ${text}</span><button onclick="resolveRem('${id}','${text}')" style="background:none; border:none; color:var(--success); font-weight:900; font-size:1.4rem;">✅</button>`;
                area.appendChild(div);
            });
        }

        /**
         * ============================================================
         * 6. 通訊與照片上傳修復
         * ============================================================
         */
        function initMediaHandling() {
            const up = document.getElementById('media-upload');
            up.onchange = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                showToast("照片上傳中...");
                const ref = fst.ref(`v7_chat/${Date.now()}_${file.name}`);
                const task = await ref.put(file);
                const url = await task.ref.getDownloadURL();
                rdb.ref('love_v7/chats').push({
                    sender: ME,
                    type: 'img',
                    content: url,
                    time: new Date().toLocaleString()
                });
            };
        }

        function actionSendMessage() {
            const inp = document.getElementById('msg-input');
            if(!inp.value) return;
            const ref = rdb.ref('love_v7/chats').push();
            ref.set({
                sender: ME,
                type: 'text',
                content: inp.value,
                time: new Date().toLocaleString()
            });
            const val = inp.value;
            inp.value = '';
            pushUndo(() => ref.remove(), `撤回訊息：${val}`);
        }

        function renderChats(chats) {
            const win = document.getElementById('chat-window');
            win.innerHTML = '';
            Object.values(chats).forEach(m => {
                const row = document.createElement('div');
                row.className = `msg-row ${m.sender === ME ? 'right' : 'left'}`;
                let body = m.content;
                if(m.type === 'img') body = `<img src="${m.content}" style="max-width:100%; border-radius:15px; display:block;">`;
                row.innerHTML = `<div class="bubble">${body}<span class="msg-meta">${m.time}</span></div>`;
                win.appendChild(row);
            });
            win.scrollTop = win.scrollHeight;
        }

        /**
         * ============================================================
         * 7. 數據統計與自動化 (Dashboard & Automation)
         * ============================================================
         */
        function updateDashboard(data) {
            // 計算天數
            const diff = Math.ceil((Date.now() - LOVE_START.getTime()) / 86400000);
            document.getElementById('ui-days').innerText = `${diff} DAYS`;

            // 計算過去30日指標
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            let love = 0, bomb = 0, sign = 0;

            if(data.calendar) {
                Object.entries(data.calendar).forEach(([date, items]) => {
                    if(new Date(date) >= thirtyDaysAgo) {
                        Object.values(items).forEach(v => {
                            if(v === '❤️') love++;
                            if(v === '💣') bomb++;
                        });
                    }
                });
            }
            if(data.signs) {
                Object.entries(data.signs).forEach(([date, users]) => {
                    if(new Date(date) >= thirtyDaysAgo) {
                        sign += Object.keys(users).length;
                    }
                });
            }

            const score = (love - bomb) * 7 + sign;
            document.getElementById('ui-score').innerText = `我們的幸福指數：${score}`;
        }

        function renderHistory(hist) {
            const eng = document.getElementById('hist-render');
            eng.innerHTML = '';
            Object.entries(hist || {}).reverse().forEach(([id, h]) => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<div><b>${h.text}</b><br><small style="color:#aaa">${h.time}</small></div><button onclick="rdb.ref('love_v7/history/${id}').remove()">🗑️</button>`;
                eng.appendChild(div);
            });
        }

        async function runAutomationCheck() {
            // 吵架檢測與替身發言邏輯
            const today = new Date().toISOString().split('T')[0];
            const snap = await rdb.ref('love_v7').once('value');
            const data = snap.val() || {};
            
            // 每天結束前如果沒有內容，由系統自動檢測 (此處省略部分複雜計時器，模擬核心邏輯)
            console.log("Automation heart beating...");
        }

        function showToast(msg) {
            const b = document.getElementById('toast-box');
            b.innerText = msg; b.classList.add('show');
            setTimeout(() => b.classList.remove('show'), 3000);
        }

        // 禁止右鍵
        window.oncontextmenu = () => false;

    </script>
</body>
