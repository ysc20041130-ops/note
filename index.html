<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Love Story</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        /* --- 全局設計規範 --- */
        :root {
            --ysc-color: #607d8b;
            --lcl-color: #ffafbd;
            --bg-pink: #fdf2f4;
            --white: #ffffff;
            --gray-deep: #1a1a1a;  /* 日曆字體變黑 */
            --gray-sub: #777777;
            --shadow-soft: 0 10px 40px rgba(0,0,0,0.06);
            --shadow-hard: 0 20px 50px rgba(0,0,0,0.12);
            --transition-smooth: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        * { 
            box-sizing: border-box; 
            font-family: -apple-system, "PingFang HK", "Helvetica Neue", sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--bg-pink); 
            margin: 0; 
            padding: 0;
            overflow-x: hidden; 
            touch-action: pan-y; 
            min-height: 100vh;
        }

        /* --- 1. 身份選擇頁面 (精美大氣版) --- */
        #identity-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-pink); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .welcome-prompt { 
            font-size: 2.8rem; 
            color: #888; 
            margin-bottom: 80px; 
            font-weight: 200; 
            letter-spacing: 5px;
            text-align: center;
        }
        .btn-identity {
            width: 340px; 
            padding: 30px; 
            margin: 20px; 
            border: none; 
            border-radius: 90px;
            font-size: 1.8rem; 
            font-weight: 900; 
            color: white; 
            cursor: pointer; 
            transition: var(--transition-smooth);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        .btn-identity:active { transform: scale(0.92); }
        .btn-ysc-main { background: var(--ysc-color); }
        .btn-lcl-main { background: var(--lcl-color); }

        /* --- 2. 全局交互組件 --- */
        #undo-master-btn {
            position: fixed; top: 25px; right: 30px; z-index: 9500;
            background: white; border: none; border-radius: 50%; width: 70px; height: 70px;
            box-shadow: var(--shadow-hard); cursor: pointer; font-size: 2rem;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition-smooth);
        }
        #undo-master-btn:active { transform: rotate(-30deg) scale(0.9); }

        #dynamic-trash {
            position: fixed; top: 0; right: -130px; width: 110px; height: 100vh;
            background: #ff3b30; color: white; display: flex; align-items: center; 
            justify-content: center; writing-mode: vertical-rl; z-index: 9000;
            transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1); 
            font-weight: 900; font-size: 1.8rem; letter-spacing: 12px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.1);
        }
        #dynamic-trash.active { right: 0; }

        /* --- 3. 導航欄 --- */
        header {
            position: sticky; top: 0; z-index: 8000; 
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(25px); 
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        nav { 
            display: flex; justify-content: space-around; 
            padding: 28px 10px; max-width: 1400px; margin: 0 auto; 
        }
        .nav-link { 
            background: none; border: none; font-size: 1.4rem; 
            font-weight: 900; color: #ddd; cursor: pointer; 
            transition: var(--transition-smooth);
        }
        .nav-link.active { color: var(--accent); transform: scale(1.15); }

        /* --- 4. 主視圖容器 --- */
        .main-scroller { max-width: 1400px; margin: 0 auto; padding: 25px; padding-bottom: 120px; }
        .app-view { display: none; }
        .app-view.active { display: block; animation: fadeInUp 0.6s ease; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card { 
            background: white; border-radius: 40px; padding: 35px; 
            margin-bottom: 35px; box-shadow: var(--shadow-soft); 
            position: relative;
        }

        /* --- 紀念日曆 UI --- */
        .hero-stats { text-align: center; }
        .text-together-days { font-size: 2.2rem; font-weight: 900; color: var(--accent); margin-bottom: 15px; }
        .text-happy-index { font-size: 1.3rem; color: #999; margin-bottom: 35px; font-weight: 500; }
        .btn-sign { 
            padding: 22px 75px; border-radius: 60px; border: none; 
            background: var(--accent); color: white; font-weight: 900; 
            font-size: 1.5rem; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .module-title { 
            font-size: 1.35rem; font-weight: 900; margin-bottom: 25px; 
            display: flex; align-items: center; color: #333; 
        }

        /* 日曆手機大屏適配 */
        .calendar-section { 
            margin: 0 -15px; background: white; border-radius: 35px; 
            padding: 20px 10px; position: relative; 
        }
        .calendar-week-labels { 
            display: grid; grid-template-columns: repeat(7, 1fr); 
            text-align: center; padding: 20px 0; color: #aaa; 
            font-weight: 900; font-size: 0.9rem;
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .calendar-day-box {
            background: #fff; border: 1.5px solid #f8f8f8; border-radius: 18px; 
            min-height: 120px; padding: 10px; display: flex; flex-direction: column; 
            position: relative; transition: 0.2s;
        }
        .calendar-day-box.is-locked { background: #fcfcfc; }
        .calendar-day-box.is-locked .calendar-day-label { color: #eee !important; }
        .calendar-day-label { 
            font-size: 0.95rem; font-weight: 900; 
            color: var(--gray-deep); /* 字體變黑 */
            margin-bottom: 8px; 
        }
        
        /* 事件標籤拖拽效果 */
        .tag-event {
            background: var(--accent); color: white; font-size: 0.85rem; 
            padding: 8px 12px; border-radius: 12px; margin-top: 6px; 
            cursor: grab; white-space: nowrap; overflow: hidden; 
            text-overflow: ellipsis; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .tag-event:active { cursor: grabbing; opacity: 0.8; transform: scale(1.05); }

        .btn-quick-heart {
            position: absolute; right: 20px; top: -70px; width: 65px; height: 65px; 
            border-radius: 50%; border: 4px solid var(--accent); background: white; 
            color: var(--accent); font-size: 1.8rem; display: flex; 
            align-items: center; justify-content: center; box-shadow: var(--shadow-soft);
        }

        /* 未來計劃區域 */
        .plan-layout { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); 
            gap: 30px; margin-top: 40px; 
        }
        .plan-box { 
            background: #fdfdfd; border: 3px dashed #eee; border-radius: 40px; 
            padding: 30px; min-height: 250px; transition: 0.3s;
        }
        .plan-box:hover { border-color: var(--accent); background: #fff; }
        .plan-input-group { display: flex; gap: 12px; margin-top: 25px; }
        .plan-input-group input { 
            flex: 1; border: 2px solid #f0f0f0; border-radius: 20px; 
            padding: 18px 22px; font-size: 1.1rem; outline: none;
        }
        .plan-input-group button { 
            border: none; background: var(--accent); color: white; 
            border-radius: 20px; padding: 0 30px; font-weight: 900; font-size: 1.2rem;
        }

        /* --- 寶寶通訊 UI --- */
        #chat-scroller { 
            height: 72vh; overflow-y: auto; padding: 30px; 
            background: #fff; border-radius: 40px; 
            display: flex; flex-direction: column; gap: 25px; 
        }
        .chat-row { display: flex; width: 100%; flex-direction: column; }
        .chat-row.me { align-items: flex-end; }
        .chat-row.you { align-items: flex-start; }
        .chat-bubble { 
            max-width: 80%; padding: 18px 25px; border-radius: 30px; 
            font-size: 1.15rem; line-height: 1.6; position: relative; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }
        .me .chat-bubble { background: var(--accent); color: white; border-bottom-right-radius: 8px; }
        .you .chat-bubble { background: #f2f2f2; color: #222; border-bottom-left-radius: 8px; }
        .chat-media { max-width: 100%; border-radius: 20px; margin-top: 12px; border: 4px solid white; box-shadow: var(--shadow-soft); }
        .chat-timestamp { font-size: 0.75rem; color: #ccc; margin: 10px 5px 0; }

        .chat-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: white; padding: 15px 25px 45px;
            display: flex; align-items: center; gap: 18px; 
            border-top: 1px solid #f0f0f0; z-index: 7500;
        }
        .chat-input-wrap { 
            flex: 1; background: #f7f7f7; border-radius: 50px; 
            padding: 0 25px; display: flex; align-items: center; 
        }
        .chat-input-wrap input { 
            flex: 1; border: none; background: transparent; 
            padding: 18px 0; font-size: 1.2rem; outline: none;
        }
        .btn-send-msg { 
            background: #2ecc71; color: white; border: none; 
            width: 60px; height: 60px; border-radius: 50%; 
            font-size: 1.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* --- 歷史紀錄 UI --- */
        .history-card { 
            background: white; padding: 30px; border-radius: 35px; 
            margin-bottom: 25px; box-shadow: var(--shadow-soft); 
            display: flex; justify-content: space-between; align-items: center;
        }
        .history-info strong { font-size: 1.25rem; color: #333; display: block; margin-bottom: 8px; }
        .history-info small { color: #bbb; font-size: 0.9rem; }
        .btn-history-del { color: #eee; font-size: 1.6rem; cursor: pointer; transition: 0.3s; }
        .btn-history-del:hover { color: #ff3b30; }
        
        #gemini-report-trigger {
            position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(135deg, #6a11cb 0%, #2575fc 100%);
            padding: 22px 45px; border-radius: 60px; color: white; 
            font-weight: 900; border: none; font-size: 1.2rem;
            box-shadow: 0 15px 40px rgba(37, 117, 252, 0.4);
        }

        /* 手機適配細節 */
        @media (max-width: 800px) {
            .plan-layout { grid-template-columns: 1fr; }
            .calendar-day-box { min-height: 105px; padding: 6px; border-radius: 12px; }
            .calendar-day-label { font-size: 0.75rem; }
            .tag-event { font-size: 0.75rem; padding: 6px 8px; }
            .welcome-prompt { font-size: 2.2rem; }
            .btn-identity { width: 85%; }
        }
    </style>
</head>
<body>

    <div id="identity-screen">
        <div class="welcome-prompt">和你的Love Story</div>
        <button class="btn-identity btn-ysc-main" onclick="startStory('ysc')">我是 ysc</button>
        <button class="btn-identity btn-lcl-main" onclick="startStory('lcl')">我是 lcl</button>
    </div>

    <button id="undo-master-btn" onclick="undoLastAction()">↩️</button>
    <div id="dynamic-trash">RELEASE TO DELETE</div>

    <header>
        <nav>
            <button class="nav-link active" id="tab-cal" onclick="setView('cal')">紀念日曆</button>
            <button class="nav-link" id="tab-chat" onclick="setView('chat')">寶寶通訊</button>
            <button class="nav-link" id="tab-hist" onclick="setView('hist')">歷史紀錄</button>
        </nav>
    </header>

    <div class="main-scroller">
        
        <div id="view-cal" class="app-view active">
            <div class="glass-card hero-stats">
                <div class="text-together-days" id="days-counter">在一起 ... 日</div>
                <div class="text-happy-index" id="happiness-display">我們的幸福指數：0.0</div>
                <button class="btn-sign" onclick="handleSignSubmit()">打卡</button>
            </div>

            <div class="glass-card">
                <span class="module-title">🔔 給對方的小提醒</span>
                <div id="remind-list-container" style="margin-bottom: 20px;"></div>
                <div class="plan-input-group">
                    <input type="text" id="remind-msg-input" placeholder="填入的提示僅對方可見">
                    <button onclick="sendPartnerReminder()">發送</button>
                </div>
            </div>

            <div class="calendar-section">
                <button class="btn-quick-heart" onclick="quickDropHeart()">❤️</button>
                <div class="calendar-week-labels">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="calendar-render-target" class="calendar-grid"></div>
            </div>

            <div class="plan-layout">
                <div class="plan-box" id="plan-eat-box">
                    <span class="module-title">🍔 豬癮犯了</span>
                    <div id="render-plan-eat"></div>
                    <div class="plan-input-group">
                        <input type="text" id="input-plan-eat" placeholder="想吃什麼...">
                        <button onclick="submitNewPlan('eat')">+</button>
                    </div>
                </div>
                <div class="plan-box" id="plan-go-box">
                    <span class="module-title">📍 腳好累呀</span>
                    <div id="render-plan-go"></div>
                    <div class="plan-input-group">
                        <input type="text" id="input-plan-go" placeholder="想到哪裡...">
                        <button onclick="submitNewPlan('go')">+</button>
                    </div>
                </div>
                <div class="plan-box" id="plan-do-box">
                    <span class="module-title">✨ 好無聊呀</span>
                    <div id="render-plan-do"></div>
                    <div class="plan-input-group">
                        <input type="text" id="input-plan-do" placeholder="想做什麼...">
                        <button onclick="submitNewPlan('do')">+</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-chat" class="app-view">
            <div id="chat-scroller"></div>
            <div class="chat-bar">
                <input type="file" id="media-uploader" hidden accept="image/*" onchange="handleMediaSelect(this)">
                <button style="border:none; background:none; font-size:2.2rem; cursor:pointer;" onclick="document.getElementById('media-uploader').click()">🖼️</button>
                <div class="chat-input-wrap">
                    <input type="text" id="chat-text-input" placeholder="說點好聽的...">
                </div>
                <button class="btn-send-msg" onclick="sendChatTextMessage()">↑</button>
            </div>
        </div>

        <div id="view-hist" class="app-view">
            <div id="history-container"></div>
            <button id="gemini-report-trigger" onclick="alert('正在彙整數據交給 Gemini...')">交給 Gemini 生成我們的戀愛報告</button>
        </div>

    </div>

    <script>
        // --- Firebase 基礎配置 ---
        const FB_CONFIG = {
            apiKey: "AIzaSyDvzd2ZhT-HfuJoJ28S14cun-6D_wNILtg",
            authDomain: "ourloveplanner.firebaseapp.com",
            databaseURL: "https://ourloveplanner-default-rtdb.firebaseio.com",
            projectId: "ourloveplanner",
            storageBucket: "ourloveplanner.firebasestorage.app",
            messagingSenderId: "671815155990",
            appId: "1:671815155990:web:ce0adcdd59f1778cb41037"
        };
        firebase.initializeApp(FB_CONFIG);
        const rtdb = firebase.database();

        let CURRENT_USER = '';
        let HISTORY_UNDO_STACK = [];
        let ACTIVE_DRAG_ITEM = null;
        const TOGETHER_DAY_ONE = new Date('2024-09-18');

        // --- 初始化入口 ---
        function startStory(role) {
            CURRENT_USER = role;
            document.getElementById('identity-screen').style.display = 'none';
            document.documentElement.style.setProperty('--accent', role === 'ysc' ? 'var(--ysc-color)' : 'var(--lcl-color)');
            
            // 計算在一起天數
            const now = new Date();
            const daysCount = Math.floor((now - TOGETHER_DAY_ONE) / (1000 * 60 * 60 * 24)) + 1;
            document.getElementById('days-counter').innerText = `在一起 ${daysCount} 日`;
            
            startRealtimeSync();
            runBackgroundBot();
        }

        function setView(viewId) {
            document.querySelectorAll('.app-view, .nav-link').forEach(el => el.classList.remove('active'));
            document.getElementById('view-'+viewId).classList.add('active');
            document.getElementById('tab-'+viewId).classList.add('active');
            if(viewId === 'chat') {
                const s = document.getElementById('chat-scroller');
                s.scrollTop = s.scrollHeight;
            }
        }

        // --- 無限次撤回邏輯 (全量快照) ---
        async function recordState(label) {
            const snap = await rtdb.ref('love_v25').once('value');
            HISTORY_UNDO_STACK.push({ snapshot: snap.val(), actionName: label });
            // 保留 100 步撤回空間
            if(HISTORY_UNDO_STACK.length > 100) HISTORY_UNDO_STACK.shift();
        }

        function undoLastAction() {
            if(HISTORY_UNDO_STACK.length === 0) {
                alert("沒有可撤回的操作");
                return;
            }
            const lastState = HISTORY_UNDO_STACK.pop();
            rtdb.ref('love_v25').set(lastState.snapshot);
            alert(`已撤回：${lastState.actionName}`);
        }

        // --- 實時數據同步 ---
        function startRealtimeSync() {
            rtdb.ref('love_v25').on('value', snap => {
                const data = snap.val() || {};
                renderCalendarUI(data.calendar || {});
                renderPartnerReminders(data.reminders || {});
                renderFuturePlans(data.plans || {});
                renderChatFlow(data.chats || {});
                renderHistoryLog(data.history || {});
                updateHappinessIndex(data.calendar || {}, data.signs || {});
            });
        }

        // --- 日曆渲染與唯一性拖拽 (重點修復) ---
        function renderCalendarUI(calData) {
            const container = document.getElementById('calendar-render-target');
            container.innerHTML = '';
            const today = new Date();
            const mondayStart = new Date(today);
            mondayStart.setDate(today.getDate() - today.getDay());

            const monNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

            for(let i=0; i<35; i++) {
                const cursor = new Date(mondayStart);
                cursor.setDate(mondayStart.getDate() + i);
                const iso = cursor.toISOString().split('T')[0];
                const isLocked = cursor < new Date().setHours(0,0,0,0);

                const cell = document.createElement('div');
                cell.className = `calendar-day-box ${isLocked ? 'is-locked' : ''}`;
                cell.dataset.date = iso;
                cell.innerHTML = `<span class="calendar-day-label">${cursor.getDate()}/${monNames[cursor.getMonth()]}</span>`;

                if(calData[iso]) {
                    Object.entries(calData[iso]).forEach(([evId, evVal]) => {
                        const tag = createEventTag(evVal, { source: 'CALENDAR', date: iso, id: evId, content: evVal });
                        cell.appendChild(tag);
                    });
                }

                cell.onclick = (e) => {
                    if(e.target === cell && !isLocked) {
                        const txt = prompt("為這一天添加事件：");
                        if(txt) commitData(`calendar/${iso}`, txt, "添加日曆事件");
                    }
                };
                container.appendChild(cell);
            }
        }

        function createEventTag(text, meta) {
            const el = document.createElement('div');
            el.className = 'tag-event';
            el.innerText = text;
            el.draggable = true;
            
            // 桌面端拖拽
            el.ondragstart = () => {
                ACTIVE_DRAG_ITEM = meta;
                document.getElementById('dynamic-trash').classList.add('active');
            };
            el.ondragend = () => document.getElementById('dynamic-trash').classList.remove('active');

            // 手機端拖拽 (Touch Events)
            el.ontouchstart = (e) => {
                ACTIVE_DRAG_ITEM = meta;
                document.getElementById('dynamic-trash').classList.add('active');
            };
            el.ontouchend = (e) => {
                const touch = e.changedTouches[0];
                const targetEl = document.elementFromPoint(touch.clientX, touch.clientY);
                processDropEvent(targetEl);
                document.getElementById('dynamic-trash').classList.remove('active');
            };

            return el;
        }

        function processDropEvent(target) {
            if(!ACTIVE_DRAG_ITEM) return;
            const trash = document.getElementById('dynamic-trash');

            // 1. 刪除邏輯
            if(target === trash || trash.contains(target)) {
                recordState(`刪除 ${ACTIVE_DRAG_ITEM.content}`);
                if(ACTIVE_DRAG_ITEM.source === 'CALENDAR') {
                    rtdb.ref(`love_v25/calendar/${ACTIVE_DRAG_ITEM.date}/${ACTIVE_DRAG_ITEM.id}`).remove();
                } else {
                    rtdb.ref(`love_v25/plans/${ACTIVE_DRAG_ITEM.category}/${ACTIVE_DRAG_ITEM.id}`).remove();
                }
                ACTIVE_DRAG_ITEM = null;
                return;
            }

            // 2. 移動到日曆邏輯 (保證唯一性：先刪後加)
            const cell = target.closest('.calendar-day-box');
            if(cell) {
                const targetDate = cell.dataset.date;
                recordState(`移動 ${ACTIVE_DRAG_ITEM.content} 至日曆`);
                // 刪除原本的
                if(ACTIVE_DRAG_ITEM.source === 'CALENDAR') {
                    rtdb.ref(`love_v25/calendar/${ACTIVE_DRAG_ITEM.date}/${ACTIVE_DRAG_ITEM.id}`).remove();
                } else {
                    rtdb.ref(`love_v25/plans/${ACTIVE_DRAG_ITEM.category}/${ACTIVE_DRAG_ITEM.id}`).remove();
                }
                // 寫入新的
                rtdb.ref(`love_v25/calendar/${targetDate}`).push(ACTIVE_DRAG_ITEM.content);
                ACTIVE_DRAG_ITEM = null;
                return;
            }

            // 3. 移動到計劃邏輯
            const planBox = target.closest('.plan-box');
            if(planBox) {
                const targetCat = planBox.id.replace('plan-', '').replace('-box', '');
                recordState(`將 ${ACTIVE_DRAG_ITEM.content} 存入計劃`);
                if(ACTIVE_DRAG_ITEM.source === 'CALENDAR') {
                    rtdb.ref(`love_v25/calendar/${ACTIVE_DRAG_ITEM.date}/${ACTIVE_DRAG_ITEM.id}`).remove();
                } else {
                    rtdb.ref(`love_v25/plans/${ACTIVE_DRAG_ITEM.category}/${ACTIVE_DRAG_ITEM.id}`).remove();
                }
                rtdb.ref(`love_v25/plans/${targetCat}`).push(ACTIVE_DRAG_ITEM.content);
                ACTIVE_DRAG_ITEM = null;
            }
        }

        // --- 幸福指數與打卡 ---
        async function handleSignSubmit() {
            const todayKey = new Date().toISOString().split('T')[0];
            const snap = await rtdb.ref(`love_v25/signs/${todayKey}/${CURRENT_USER}`).once('value');
            if(snap.exists()) {
                alert("今天已經打過卡啦");
                return;
            }
            recordState("打卡操作");
            rtdb.ref(`love_v25/signs/${todayKey}/${CURRENT_USER}`).set(true);
            alert("打卡成功，今天又是填滿愛的一天！");
        }

        function updateHappinessIndex(cal, signs) {
            const threshold = new Date();
            threshold.setDate(threshold.getDate() - 30);
            let love=0, bomb=0, signCount=0;

            // 統計❤️與💣
            Object.entries(cal).forEach(([date, items]) => {
                if(new Date(date) >= threshold) {
                    Object.values(items).forEach(v => {
                        if(v === '❤️') love++;
                        if(v === '💣') bomb++;
                    });
                }
            });

            // 統計打卡
            Object.entries(signs || {}).forEach(([date, users]) => {
                if(new Date(date) >= threshold) {
                    signCount += Object.keys(users).length;
                }
            });

            const score = (love - bomb) * 7 + signCount;
            document.getElementById('happiness-display').innerText = `我們的幸福指數：${score.toFixed(1)}`;
        }

        // --- 小提醒功能 ---
        function sendPartnerReminder() {
            const input = document.getElementById('remind-msg-input');
            const targetUser = CURRENT_USER === 'ysc' ? 'lcl' : 'ysc';
            if(!input.value) return;
            recordState("發送提醒");
            rtdb.ref(`love_v25/reminders/${targetUser}`).push({
                text: input.value, from: CURRENT_USER, ts: Date.now()
            });
            input.value = '';
        }

        function renderPartnerReminders(rems) {
            const list = document.getElementById('remind-list-container');
            list.innerHTML = '';
            const myRems = rems[CURRENT_USER] || {};
            Object.entries(myRems).forEach(([id, data]) => {
                const div = document.createElement('div');
                div.style = "background:#fff5f7; padding:20px; border-radius:20px; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; border:1px solid #ffeef1;";
                div.innerHTML = `
                    <span style="font-size:1.15rem; color:#d63384; font-weight:800;">💌 ${data.text}</span>
                    <button onclick="readReminder('${id}', '${data.text}')" style="background:none; border:none; font-size:1.8rem; cursor:pointer;">✅</button>
                `;
                list.appendChild(div);
            });
        }

        function readReminder(id, msg) {
            recordState("已讀提醒");
            rtdb.ref(`love_v25/reminders/${CURRENT_USER}/${id}`).remove();
            logToHistory(`已讀消息：${msg}`);
        }

        // --- 通訊功能 (含修復相片) ---
        function sendChatTextMessage() {
            const inp = document.getElementById('chat-text-input');
            if(!inp.value) return;
            rtdb.ref('love_v25/chats').push({
                mode: 'TEXT', content: inp.value, sender: CURRENT_USER, ts: Date.now()
            });
            inp.value = '';
        }

        function handleMediaSelect(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                rtdb.ref('love_v25/chats').push({
                    mode: 'IMAGE', content: ev.target.result, sender: CURRENT_USER, ts: Date.now()
                });
            };
            reader.readAsDataURL(file);
        }

        function renderChatFlow(chats) {
            const box = document.getElementById('chat-scroller');
            box.innerHTML = '';
            Object.entries(chats).forEach(([id, m]) => {
                const row = document.createElement('div');
                row.className = `chat-row ${m.sender === CURRENT_USER ? 'me' : 'you'}`;
                let body = m.mode === 'TEXT' ? m.content : `<img src="${m.content}" class="chat-media">`;
                row.innerHTML = `
                    <div class="chat-bubble">${body}</div>
                    <div class="chat-timestamp">${new Date(m.ts).toLocaleString()}</div>
                `;
                box.appendChild(row);
            });
            box.scrollTop = box.scrollHeight;
        }

        // --- 歷史紀錄與自動化 ---
        function logToHistory(action) {
            const d = new Date();
            const timeStr = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()} ${d.getHours()}:${d.getMinutes()}`;
            rtdb.ref('love_v25/history').push({ action, time: timeStr });
        }

        function renderHistoryLog(hist) {
            const target = document.getElementById('history-container');
            target.innerHTML = '';
            Object.entries(hist).reverse().forEach(([id, item]) => {
                const card = document.createElement('div');
                card.className = 'history-card';
                card.innerHTML = `
                    <div class="history-info">
                        <strong>${item.action}</strong>
                        <small>${item.time}</small>
                    </div>
                    <div class="btn-history-del" onclick="deleteHistory('${id}')">🗑️</div>
                `;
                target.appendChild(card);
            });
        }

        function deleteHistory(id) {
            recordState("刪除歷史條目");
            rtdb.ref(`love_v25/history/${id}`).remove();
        }

        function runBackgroundBot() {
            // 每日吵架檢測 (23:59:59)
            setInterval(async () => {
                const n = new Date();
                if(n.getHours() === 23 && n.getMinutes() === 59 && n.getSeconds() === 59) {
                    const todayKey = n.toISOString().split('T')[0];
                    const snap = await rtdb.ref(`love_v25/signs/${todayKey}`).once('value');
                    if(!snap.exists()) {
                        rtdb.ref(`love_v25/calendar/${todayKey}`).push('💣');
                        logToHistory("💣好像和寶寶吵架了");
                    }
                }
            }, 1000);

            // 余尚初的小替身邏輯 (8-12am)
            if(CURRENT_USER === 'ysc') {
                const dayTag = 'bot_sent_' + new Date().toDateString();
                if(!localStorage.getItem(dayTag)) {
                    const delay = (Math.random() * 5 + 2) * 1000; // 模擬隨機
                    setTimeout(() => {
                        rtdb.ref('love_v25/chats').push({
                            mode: 'TEXT', content: "我是余尚初的小替身，他偷偷告訴我說他想你了🥺", sender: 'ysc', ts: Date.now()
                        });
                        localStorage.setItem(dayTag, 'true');
                    }, delay);
                }
            }
        }

        // --- 其他輔助功能 ---
        function commitData(path, val, log) {
            recordState(log);
            rtdb.ref('love_v25/' + path).push(val);
            logToHistory(log);
        }

        function submitNewPlan(cat) {
            const inp = document.getElementById('input-plan-'+cat);
            if(inp.value) commitData(`plans/${cat}`, inp.value, `添加計劃：${inp.value}`);
            inp.value = '';
        }

        function renderFuturePlans(plans) {
            ['eat','go','do'].forEach(cat => {
                const box = document.getElementById('render-plan-'+cat);
                box.innerHTML = '';
                Object.entries(plans[cat] || {}).forEach(([id, val]) => {
                    box.appendChild(createEventTag(val, { source: 'PLAN', category: cat, id: id, content: val }));
                });
            });
        }

        function quickDropHeart() {
            const today = new Date().toISOString().split('T')[0];
            commitData(`calendar/${today}`, '❤️', "添加了一個 ❤️");
        }

        // 全局拖放支持
        window.ondragover = (e) => e.preventDefault();
        window.ondrop = (e) => {
            const target = document.elementFromPoint(e.clientX, e.clientY);
            processDropEvent(target);
        };
    </script>
</body>
</html>
