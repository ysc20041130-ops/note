<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶寶的 Love Planner Pro (全功能完整版)</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root { 
            --ysc-blue: #607d8b; 
            --lcl-pink: #ffafbd; 
            --accent: var(--lcl-pink); 
            --bg: #fdf2f4; 
            --text: #4a4a4a; 
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            margin: 0; 
            color: var(--text); 
            padding-bottom: 80px; 
            overflow-x: hidden;
            -webkit-user-select: none; 
        }
        
        /* 導航欄 */
        #main-nav { 
            position: sticky; 
            top: 0; 
            background: rgba(253, 242, 244, 0.95); 
            backdrop-filter: blur(5px); 
            display: flex; 
            justify-content: space-around; 
            padding: 15px; 
            z-index: 1000; 
            border-bottom: 1px solid #feefee; 
        }
        .nav-btn { 
            background: none; border: none; font-size: 1rem; font-weight: bold; 
            color: #999; cursor: pointer; padding: 5px 15px; border-radius: 20px; 
            transition: all 0.3s;
        }
        .nav-btn.active { color: var(--accent); background: rgba(255, 175, 189, 0.1); }

        /* 登入介面 */
        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #fdf2f4; z-index: 9999; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .login-btn { 
            width: 220px; padding: 20px; margin: 10px; border-radius: 50px; 
            border: none; font-size: 1.2rem; font-weight: bold; color: white; 
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        .btn-ysc { background: var(--ysc-blue); } .btn-lcl { background: var(--lcl-pink); }
        
        /* 公用區塊樣式 */
        .page { display: none; padding: 15px; } 
        .page.active { display: block; }
        .section { 
            background: white; border-radius: 20px; padding: 20px; 
            margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
        }
        .section-header { 
            display: flex; justify-content: space-between; align-items: center; 
            margin-bottom: 15px; border-bottom: 1px solid #f9f9f9; padding-bottom: 8px; 
        }
        h2 { font-size: 0.95rem; color: var(--accent); margin: 0; letter-spacing: 1px; }
        
        /* 按鈕與輸入框 */
        .heart-add-btn { 
            background: var(--bg); color: var(--accent); border: 1.5px solid var(--accent); 
            padding: 4px 12px; border-radius: 15px; font-size: 0.9rem; cursor: pointer; 
        }
        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #eee; outline: none; font-size: 14px; }
        button.add-btn { background: var(--accent); color: white; border: none; padding: 0 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* 清單項目 */
        .wish-item { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px; background: #fff; border: 1px solid #f0f0f0; 
            border-radius: 12px; margin-bottom: 8px; cursor: grab; font-size: 0.9rem; 
        }
        .check-btn { background: none; border: none; cursor: pointer; font-size: 1.1rem; filter: grayscale(1); transition: 0.2s; }
        .check-btn:hover { filter: grayscale(0); transform: scale(1.2); }
        
        /* 日曆樣式 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .day-card { 
            background: #fff; border: 1px solid #feefee; border-radius: 10px; 
            min-height: 90px; padding: 5px; position: relative; 
            display: flex; flex-direction: column; overflow: hidden; 
        }
        .day-card.is-today { border: 2.5px solid var(--accent); background: #fffcfd; }
        .date-label { font-size: 0.65rem; color: #bbb; font-weight: bold; margin-bottom: 4px; }
        .plan-tag { 
            background: var(--accent); color: white; padding: 2px 4px; 
            border-radius: 4px; font-size: 0.65rem; margin-top: 2px; 
            cursor: grab; word-break: break-all; 
        }

        /* 聊天氣泡 */
        #chat-messages { 
            height: 55vh; overflow-y: auto; display: flex; 
            flex-direction: column; gap: 10px; padding: 10px; 
            background: #fafafa; border-radius: 15px; 
        }
        .msg-bubble { max-width: 80%; padding: 10px 14px; border-radius: 15px; font-size: 0.9rem; line-height: 1.4; }
        .msg-bubble.me { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .msg-bubble.other { align-self: flex-start; background: #eee; color: #333; border-bottom-left-radius: 2px; }

        /* 歷史紀錄 */
        .archive-item { 
            font-size: 0.8rem; color: #888; padding: 10px; 
            border-bottom: 1px dashed #eee; background: #fdfdfd;
        }

        /* 垃圾桶 */
        #trash-can { 
            position: fixed; top: 0; right: -85px; width: 80px; height: 100%; 
            background: #ff4d4d; color: white; display: flex; 
            align-items: center; justify-content: center; writing-mode: vertical-rl; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); z-index: 2000; font-weight: bold; 
        }
        #trash-can.visible { right: 0; box-shadow: -5px 0 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: #888; margin-bottom: 20px; font-weight: 300;">❤️ 寶寶專屬空間</h1>
        <button class="login-btn btn-ysc" onclick="initApp('ysc')">我是 ysc</button>
        <button class="login-btn btn-lcl" onclick="initApp('lcl')">我是 lcl</button>
    </div>

    <div id="trash-can">🗑️ 拖到這裡刪除</div>

    <div id="main-nav">
        <button class="nav-btn active" onclick="switchPage('calendar', this)">🗓️ 紀念日曆</button>
        <button class="nav-btn" onclick="switchPage('chat', this)">💬 寶寶通訊</button>
        <button class="nav-btn" onclick="switchPage('archive', this)">📜 歷史紀錄</button>
    </div>

    <div id="page-calendar" class="page active">
        <div id="header-stats" style="text-align: center; margin-bottom: 20px; background: white; padding: 20px; border-radius: 20px;">
            <div id="together-days" style="font-size: 1.4rem; color: var(--accent); font-weight: bold;">在一起 0 天</div>
            <div id="love-index" style="font-size: 0.85rem; color: #999; margin-top: 5px;">本月幸福指數：0.0</div>
        </div>

        <div class="section">
            <div class="section-header"><h2>☀️ 給對方的早上必讀 (驚喜區)</h2></div>
            <div id="todoList"></div>
            <div class="input-group">
                <input type="text" id="taskInput" placeholder="寫給對方的內容只有對方能看見...">
                <button class="add-btn" onclick="addMorningTask()">發送</button>
            </div>
        </div>

        <div class="section">
            <div class="section-header">
                <h2>🗓️ 紀念日曆</h2>
                <button class="heart-add-btn" onclick="addHeartToToday()">➕ ❤️</button>
            </div>
            <div id="weekdayHeaders" class="calendar-grid" style="text-align:center; font-size:0.7rem; color:#ccc; margin-bottom:8px;"></div>
            <div id="rollingCalendar" class="calendar-grid"></div>
        </div>

        <div class="section">
            <div class="section-header"><h2>🍰 美食清單</h2></div>
            <div id="list-food"></div>
            <div class="input-group"><input type="text" id="input-food" placeholder="想吃什麼..."><button class="add-btn" onclick="addWish('food')">＋</button></div>
        </div>
        
        <div class="section">
            <div class="section-header"><h2>✈️ 旅遊清單</h2></div>
            <div id="list-travel"></div>
            <div class="input-group"><input type="text" id="input-travel" placeholder="想去哪裡..."><button class="add-btn" onclick="addWish('travel')">＋</button></div>
        </div>
    </div>

    <div id="page-chat" class="page">
        <div class="section">
            <div class="section-header"><h2>💬 寶寶的聊天室</h2></div>
            <div id="chat-messages"></div>
            <div class="input-group" style="margin-top:10px;">
                <input type="text" id="chatInput" placeholder="說點什麼...">
                <button class="add-btn" onclick="sendChatMessage()">送出</button>
            </div>
        </div>
    </div>

    <div id="page-archive" class="page">
        <div class="section">
            <div class="section-header"><h2>📜 我們的時光回憶</h2></div>
            <div id="fullArchiveList"></div>
        </div>
    </div>

    <script>
        // --- Firebase 初始化 ---
        const firebaseConfig = {
            apiKey: "AIzaSyDvzd2ZhT-HfuJoJ28S14cun-6D_wNILtg",
            authDomain: "ourloveplanner.firebaseapp.com",
            databaseURL: "https://ourloveplanner-default-rtdb.firebaseio.com",
            projectId: "ourloveplanner",
            storageBucket: "ourloveplanner.firebasestorage.app",
            messagingSenderId: "671815155990",
            appId: "1:671815155990:web:ce0adcdd59f1778cb41037"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = '', draggedItem = null, allData = {};
        const startDate = new Date('2024-09-18');
        const monthShort = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        const formatDateKey = (date) => {
            const d = new Date(date);
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };

        // --- 初始化 App ---
        function initApp(u) {
            currentUser = u;
            document.getElementById('login-screen').style.display = 'none';
            document.documentElement.style.setProperty('--accent', (u === 'ysc' ? '#607d8b' : '#ffafbd'));
            
            const diff = Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24)) + 1;
            document.getElementById('together-days').innerText = `在一起 ${diff} 天`;
            
            db.ref('data').on('value', s => { 
                allData = s.val() || {}; 
                render(allData); 
            });
            updateActivity();
        }

        function updateActivity() { db.ref('data/lastActivityTime').set(Date.now()); }

        function switchPage(p, btn) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(bn => bn.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            btn.classList.add('active');
            updateActivity();
        }

        // --- 核心邏輯：完成與歸檔 ---
        function archiveTask(type, id, text, cat = null) {
            const timeStr = new Date().toLocaleString('zh-HK', { hour12: false });
            db.ref('data/archives').push({
                text: `✅ ${text}`,
                timestamp: timeStr,
                type: 'manual'
            });
            if(type === 'morning') db.ref(`data/morningTasks/${id}`).remove();
            if(type === 'wish') db.ref(`data/wishes/${cat}/${id}`).remove();
            updateActivity();
        }

        function addMorningTask() {
            const i = document.getElementById('taskInput');
            if(!i.value) return;
            db.ref('data/morningTasks').push({ text: i.value, by: currentUser });
            i.value = ''; updateActivity();
        }

        function addWish(cat) {
            const i = document.getElementById('input-' + cat);
            if(!i.value) return;
            db.ref(`data/wishes/${cat}`).push({ text: i.value, by: currentUser });
            i.value = ''; updateActivity();
        }

        function sendChatMessage() {
            const i = document.getElementById('chatInput');
            if(!i.value) return;
            db.ref('data/chats').push({ text: i.value, by: currentUser, time: Date.now() });
            i.value = ''; updateActivity();
        }

        function addHeartToToday() {
            const todayKey = formatDateKey(new Date());
            db.ref(`data/plans/${todayKey}`).push('❤️');
            updateActivity();
        }

        // --- 渲染函數 (確保不遺漏任何功能) ---
        function render(data) {
            const trash = document.getElementById('trash-can');
            trash.ondragover = (e) => e.preventDefault();
            trash.ondrop = () => {
                if(!draggedItem) return;
                if(draggedItem.type === 'wish') db.ref(`data/wishes/${draggedItem.cat}/${draggedItem.id}`).remove();
                if(draggedItem.type === 'plan') db.ref(`data/plans/${draggedItem.date}/${draggedItem.id}`).remove();
                if(draggedItem.type === 'morning') db.ref(`data/morningTasks/${draggedItem.id}`).remove();
                trash.classList.remove('visible');
                updateActivity();
            };

            // 吵架偵測：24小時無活動
            const lastActive = data.lastActivityTime || 0;
            if(lastActive > 0 && (Date.now() - lastActive > 86400000)) {
                const todayKey = formatDateKey(new Date());
                if(!data.archives || !Object.values(data.archives).find(a => a.date === todayKey && a.type === 'fight')) {
                    db.ref('data/archives').push({ type: 'fight', text: '💣 寶寶今天好像吵架了 (App 已沉寂24小時)', date: todayKey, timestamp: new Date().toLocaleString() });
                }
            }

            // 幸福指數計算 (❤️❤️)
            let totalHearts = 0;
            if(data.plans) {
                Object.values(data.plans).forEach(day => {
                    Object.values(day).forEach(p => { if(p === '❤️') totalHearts++; });
                });
            }
            document.getElementById('love-index').innerText = `本月幸福指數：${(totalHearts/2).toFixed(1)}`;

            // 早上必讀：僅顯示對方寫的內容
            const morningBox = document.getElementById('todoList'); morningBox.innerHTML = '';
            Object.entries(data.morningTasks || {}).forEach(([id, t]) => {
                if(t.by !== currentUser) {
                    const d = document.createElement('div'); d.className = 'wish-item';
                    d.innerHTML = `<span>☀️ ${t.text}</span><button class="check-btn" onclick="archiveTask('morning','${id}','${t.text}')">✔️</button>`;
                    d.draggable = true;
                    d.ondragstart = () => { draggedItem = { type:'morning', id }; trash.classList.add('visible'); };
                    d.ondragend = () => trash.classList.remove('visible');
                    morningBox.appendChild(d);
                }
            });

            // 願望清單
            ['food', 'travel'].forEach(cat => {
                const box = document.getElementById('list-' + cat); box.innerHTML = '';
                Object.entries(data.wishes?.[cat] || {}).forEach(([id, w]) => {
                    const d = document.createElement('div'); d.className = 'wish-item';
                    d.innerHTML = `<span>${w.text}</span><button class="check-btn" onclick="archiveTask('wish','${id}','${w.text}','${cat}')">✔️</button>`;
                    d.draggable = true;
                    d.ondragstart = () => { draggedItem = { type:'wish', cat, id, text:w.text }; trash.classList.add('visible'); };
                    d.ondragend = () => trash.classList.remove('visible');
                    box.appendChild(d);
                });
            });

            // 歷史紀錄
            const fullArchBox = document.getElementById('fullArchiveList'); fullArchBox.innerHTML = '';
            const archives = Object.values(data.archives || {}).reverse();
            archives.forEach(a => {
                const d = document.createElement('div'); d.className = 'archive-item';
                d.innerHTML = `<div style="color:#4a4a4a;">${a.text}</div><div style="font-size:0.7rem; color:#ccc; margin-top:4px;">${a.timestamp}</div>`;
                fullArchBox.appendChild(d);
            });

            // 通訊紀錄
            const msgBox = document.getElementById('chat-messages'); msgBox.innerHTML = '';
            Object.values(data.chats || {}).forEach(m => {
                const b = document.createElement('div'); b.className = `msg-bubble ${m.by === currentUser ? 'me' : 'other'}`;
                b.innerText = m.text; msgBox.appendChild(b);
            });
            msgBox.scrollTop = msgBox.scrollHeight;

            // 日曆渲染
            const cal = document.getElementById('rollingCalendar'); cal.innerHTML = '';
            const todayKey = formatDateKey(new Date());
            const start = new Date(); start.setDate(start.getDate() - start.getDay());
            
            document.getElementById('weekdayHeaders').innerHTML = 'Sun,Mon,Tue,Wed,Thu,Fri,Sat'.split(',').map(d => `<div>${d}</div>`).join('');

            for(let i=0; i<35; i++) {
                const curr = new Date(start); curr.setDate(start.getDate() + i);
                const dKey = formatDateKey(curr);
                const card = document.createElement('div');
                card.className = `day-card ${dKey === todayKey ? 'is-today' : ''}`;
                card.innerHTML = `<span class="date-label">${curr.getDate()}/${monthShort[curr.getMonth()]}</span>`;
                
                // 點擊新增計畫
                card.onclick = (e) => { 
                    if(e.target !== card) return;
                    const v = prompt(`${dKey} 有什麼新計畫？`); if(v) db.ref(`data/plans/${dKey}`).push(v); 
                };
                
                // 拖拽放入
                card.ondragover = (e) => e.preventDefault();
                card.ondrop = (e) => {
                    e.stopPropagation();
                    if(!draggedItem) return;
                    db.ref(`data/plans/${dKey}`).push(draggedItem.text);
                    if(draggedItem.type === 'wish') db.ref(`data/wishes/${draggedItem.cat}/${draggedItem.id}`).remove();
                    updateActivity();
                };

                // 顯示該天計畫
                if(data.plans?.[dKey]) {
                    Object.entries(data.plans[dKey]).forEach(([pid, p]) => {
                        const t = document.createElement('div'); t.className = 'plan-tag'; t.innerText = p;
                        if(p === '❤️') t.style.background = "#ff4d4d";
                        t.draggable = true;
                        t.ondragstart = (e) => { 
                            e.stopPropagation(); 
                            draggedItem = { type:'plan', date:dKey, id:pid, text:p }; 
                            trash.classList.add('visible'); 
                        };
                        t.ondragend = () => trash.classList.remove('visible'); // 拖拽結束回彈
                        card.appendChild(t);
                    });
                }
                cal.appendChild(card);
            }
        }
    </script>
</body>
</html>
