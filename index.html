<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Love Planner</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --main-pink: #ffafbd; --accent: #ff4d6d; --bg: #fdf2f4; --text: #4a4a4a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); padding: 15px; margin: 0; color: var(--text); }
        .section { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { font-size: 1.1rem; color: var(--accent); margin-top: 0; border-bottom: 2px solid var(--bg); padding-bottom: 10px; margin-bottom: 15px; }
        
        /* 身份切換 */
        .identity-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #eee; color: #888; font-weight: bold; cursor: pointer; }
        .tab-btn.active { background: var(--main-pink); color: white; }

        /* 日曆網格 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .weekday-header { font-size: 0.7rem; color: #999; text-align: center; padding-bottom: 5px; }
        .day-card { background: #fff; border: 1px solid #ffeef1; border-radius: 10px; min-height: 70px; padding: 5px; cursor: pointer; display: flex; flex-direction: column; }
        .day-card.is-past { background: #f5f5f5; border-color: #eee; cursor: default; pointer-events: none; opacity: 0.5; }
        .day-card.is-today { border: 2px solid var(--accent); background: #fff0f3; }
        .date-label { font-size: 0.65rem; font-weight: bold; color: #bbb; }
        .plan-tag { background: var(--accent); color: white; font-size: 0.65rem; padding: 1px 3px; border-radius: 3px; margin-top: 2px; word-break: break-all; }

        /* Wish List 樣式 */
        .wish-cat { margin-bottom: 15px; border-left: 4px solid var(--main-pink); padding-left: 10px; }
        .wish-cat h3 { font-size: 0.95rem; margin: 0 0 8px 0; color: #666; }
        .wish-item { font-size: 0.85rem; background: #fff9fa; padding: 5px 10px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; }

        /* 記憶庫與任務 */
        .item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; }
        input { width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #eee; border-radius: 10px; outline: none; margin-bottom: 10px; }
        
        /* Gemini 按鈕 */
        .gemini-btn { width: 100%; background: linear-gradient(135deg, #6e8efb, #a777e3); color: white; border: none; padding: 12px; border-radius: 15px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="identity-selector">
        <button id="btnYSC" class="tab-btn active" onclick="switchUser('ysc')">ysc</button>
        <button id="btnLCL" class="tab-btn" onclick="switchUser('lcl')">lcl</button>
    </div>

    <div class="section">
        <h2 id="morningTitle">早上必讀</h2>
        <div id="todoList"></div>
        <input type="text" id="taskInput" placeholder="輸入任務按 Enter 發布..." onkeypress="if(event.key==='Enter') addTask()">
    </div>

    <div class="section">
        <h2>🧷 Wish List</h2>
        
        <div class="wish-cat">
            <h3>豬癮犯了</h3>
            <div id="wish-food"></div>
            <input type="text" placeholder="想吃什麼？" onkeypress="if(event.key==='Enter') addWish('food', this)">
        </div>

        <div class="wish-cat">
            <h3>腳要痛了</h3>
            <div id="wish-travel"></div>
            <input type="text" placeholder="想去哪裡玩？" onkeypress="if(event.key==='Enter') addWish('travel', this)">
        </div>

        <div class="wish-cat">
            <h3>好無聊</h3>
            <div id="wish-activity"></div>
            <input type="text" placeholder="想做什麼有趣的事？" onkeypress="if(event.key==='Enter') addWish('activity', this)">
        </div>
    </div>

    <div class="section">
        <h2 id="calendarTitle">📅 未來計畫</h2>
        <div class="calendar-grid" id="weekdayHeaders"></div>
        <div class="calendar-grid" id="rollingCalendar"></div>
    </div>

    <div class="section">
        <h2>📓 長期記憶庫</h2>
        <button class="gemini-btn" onclick="generateLoveReport()">✨ 讓 Gemini 給予戀愛評價</button>
        <div id="archiveList" style="margin-top:15px;"></div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDvzd2ZhT-HfuJoJ28S14cun-6D_wNILtg",
        authDomain: "ourloveplanner.firebaseapp.com",
        databaseURL: "https://ourloveplanner-default-rtdb.firebaseio.com",
        projectId: "ourloveplanner",
        storageBucket: "ourloveplanner.firebasestorage.app",
        messagingSenderId: "671815155990",
        appId: "1:671815155990:web:ce0adcdd59f1778cb41037"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUser = 'ysc';
    const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

    const getToday = () => { let d = new Date(); d.setHours(0,0,0,0); return d; };
    const formatDate = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

    db.ref('data').on('value', (s) => {
        const data = s.val() || {};
        autoArchive(data.plans);
        render(data);
    });

    function switchUser(u) {
        currentUser = u;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('btn' + u.toUpperCase()).classList.add('active');
        db.ref('data').once('value', s => render(s.val()));
    }

    // --- 功能函式 ---
    function addTask() {
        const i = document.getElementById('taskInput');
        if(!i.value) return;
        db.ref('data/tasks').push({ text: i.value, from: currentUser, to: currentUser==='ysc'?'lcl':'ysc', completed: false, time: new Date().toLocaleString() });
        i.value = '';
    }

    function addWish(cat, el) {
        if(!el.value) return;
        db.ref('data/wishes/' + cat).push({ text: el.value, by: currentUser });
        el.value = '';
    }

    function editPlan(date) {
        const val = prompt(`在 ${date} 添加計畫:`);
        if(val) db.ref('data/plans/' + date).push(val);
    }

    function autoArchive(plans) {
        if(!plans) return;
        const todayStr = formatDate(getToday());
        Object.keys(plans).forEach(date => {
            if(date < todayStr) {
                Object.values(plans[date]).forEach(v => {
                    db.ref('data/tasks').push({ text: `[計畫] ${v}`, completed: true, time: date, finishTime: '自動歸檔' });
                });
                db.ref('data/plans/' + date).remove();
            }
        });
    }

    // --- 戀愛報告生成 ---
    function generateLoveReport() {
        db.ref('data').once('value', s => {
            const data = s.val() || {};
            const archives = Object.values(data.tasks || {}).filter(t => t.completed).slice(-20);
            const wishes = data.wishes || {};
            
            let report = "親愛的 Gemini，這是我和伴侶過去一個月的戀愛紀錄：\n\n【完成的事務】\n";
            archives.forEach(t => report += `- ${t.text} (${t.time})\n`);
            report += "\n【目前的願望清單】\n";
            if(wishes.food) report += "- 想吃：" + Object.values(wishes.food).map(i=>i.text).join(', ') + "\n";
            if(wishes.travel) report += "- 想去：" + Object.values(wishes.travel).map(i=>i.text).join(', ') + "\n";
            
            report += "\n請根據這些互動評估我們的戀愛狀態，並給我們一些甜蜜的建議或下個月的安排啟發！";
            
            console.log(report);
            alert("已生成報告邏輯！請在對話框輸入：'幫我匯總這段紀錄並評價'，我會為你分析。");
            // 這裡可以改為直接複製到剪貼板
            navigator.clipboard.writeText(report);
            alert("報告內容已複製到剪貼板，請直接貼給 Gemini！");
        });
    }

    function render(data) {
        // 1. 任務與記憶庫
        const todo = document.getElementById('todoList');
        const arch = document.getElementById('archiveList');
        todo.innerHTML = ''; arch.innerHTML = '';
        document.getElementById('morningTitle').innerText = `早上必讀：${currentUser==='ysc'?'lcl':'ysc'} 的消息`;
        
        Object.entries(data.tasks || {}).reverse().forEach(([id, t]) => {
            if(t.completed) arch.innerHTML += `<div class="archive-item"><b>${t.text}</b> <small>${t.time}</small></div>`;
            else if(t.to === currentUser) todo.innerHTML += `<div class="item"><span>${t.text}</span><button onclick="db.ref('data/tasks/${id}').update({completed:true, finishTime:new Date().toLocaleString()})">✅</button></div>`;
        });

        // 2. Wish List
        ['food', 'travel', 'activity'].forEach(cat => {
            const el = document.getElementById('wish-' + cat);
            el.innerHTML = '';
            if(data.wishes && data.wishes[cat]) {
                Object.entries(data.wishes[cat]).forEach(([id, w]) => {
                    el.innerHTML += `<div class="wish-item"><span>${w.text}</span><span onclick="db.ref('data/wishes/${cat}/${id}').remove()" style="cursor:pointer">🗑️</span></div>`;
                });
            }
        });

        // 3. 5週日曆
        const cal = document.getElementById('rollingCalendar');
        const head = document.getElementById('weekdayHeaders');
        cal.innerHTML = ''; head.innerHTML = '';
        dayNames.forEach(n => head.innerHTML += `<div class="weekday-header">${n}</div>`);

        const start = getToday();
        start.setDate(start.getDate() - start.getDay());

        for(let i=0; i<35; i++) {
            const curr = new Date(start); curr.setDate(start.getDate() + i);
            const dKey = formatDate(curr);
            const isPast = curr < getToday();
            const card = document.createElement('div');
            card.className = `day-card ${isPast?'is-past':''} ${dKey===formatDate(getToday())?'is-today':''}`;
            if(!isPast) card.onclick = () => editPlan(dKey);

            let plans = "";
            if(data.plans && data.plans[dKey]) Object.values(data.plans[dKey]).forEach(p => plans += `<div class="plan-tag">${p}</div>`);

            // --- 這是修改後 11/Apr 的樣式 ---
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            const dateDisplay = `${curr.getDate()}/${monthNames[curr.getMonth()]}`;

card.innerHTML = `<span class="date-label">${dateDisplay}</span><div style="flex:1;overflow:hidden">${plans}</div>`;
cal.appendChild(card);
        }
    }
</script>
</body>
</html>
