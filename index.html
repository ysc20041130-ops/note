<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>寶寶的 Love Planner Pro</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'LovePlanner','short_name':'LovePlanner','start_url':'/','display':'standalone','background_color':'#fdf2f4','theme_color':'#ffafbd','icons':[{'src':'https://img0.baidu.com/it/u=3027201083,1695537574&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=500','sizes':'500x500','type':'image/jpeg'}]}">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://img0.baidu.com/it/u=3027201083,1695537574&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=500">

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { --ysc-blue: #607d8b; --lcl-pink: #ffafbd; --accent: var(--lcl-pink); --bg: #fdf2f4; --text: #4a4a4a; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; color: var(--text); padding-bottom: 80px; }
        
        #main-nav { position: sticky; top: 0; background: rgba(253, 242, 244, 0.95); backdrop-filter: blur(5px); display: flex; justify-content: space-around; padding: 15px; z-index: 1000; border-bottom: 1px solid #feefee; }
        .nav-btn { background: none; border: none; font-size: 1rem; font-weight: bold; color: #999; cursor: pointer; padding: 5px 10px; border-radius: 20px; }
        .nav-btn.active { color: var(--accent); background: rgba(255, 175, 189, 0.1); }

        #web-notification { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; background: white; padding: 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 10000; text-align: center; font-weight: bold; transition: 0.5s ease; border: 2px solid var(--accent); }
        #web-notification.show { top: 20px; }

        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fdf2f4; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .login-btn { width: 200px; padding: 20px; margin: 10px; border-radius: 50px; border: none; font-size: 1.2rem; font-weight: bold; color: white; cursor: pointer; }
        .btn-ysc { background: var(--ysc-blue); } .btn-lcl { background: var(--lcl-pink); }
        #together-days { text-align: center; color: var(--accent); font-weight: bold; font-size: 1.3rem; padding: 20px; background: white; border-radius: 20px; margin: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }

        .page { display: none; padding: 15px; } .page.active { display: block; }
        .section { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { font-size: 1rem; color: var(--accent); margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        
        /* 日曆格子的愛心按鈕 */
        .day-card { background: #fff; border: 1px solid #feefee; border-radius: 10px; min-height: 75px; padding: 5px; position: relative; }
        .heart-quick-btn { position: absolute; bottom: 2px; right: 2px; font-size: 0.8rem; cursor: pointer; opacity: 0.3; transition: 0.3s; }
        .heart-quick-btn:hover { opacity: 1; transform: scale(1.2); }
        .day-card.is-today { border: 2px solid var(--accent); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .plan-tag { background: var(--accent); color: white; padding: 2px 4px; border-radius: 4px; font-size: 0.65rem; margin-top: 2px; cursor: grab; }

        /* 通訊界面 */
        #chat-container { display: flex; flex-direction: column; height: 60vh; background: #fafafa; border-radius: 20px; overflow: hidden; }
        #chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .msg-bubble { max-width: 75%; padding: 8px 12px; border-radius: 15px; font-size: 0.9rem; position: relative; }
        .msg-bubble.me { align-self: flex-end; background: var(--accent); color: white; }
        .msg-bubble.other { align-self: flex-start; background: #eee; color: #333; }
        .msg-bubble img { max-width: 100%; border-radius: 10px; margin-top: 5px; }

        /* 可折疊歷史紀錄 */
        .archive-toggle { cursor: pointer; color: #999; font-size: 0.85rem; padding: 10px; border-radius: 10px; background: #f9f9f9; text-align: center; margin-top: 10px; }
        #archiveList { display: none; margin-top: 10px; font-size: 0.8rem; color: #888; border-top: 1px dashed #eee; padding-top: 10px; }
        #trash-can { position: fixed; top: 0; right: -80px; width: 80px; height: 100%; background: #ff4d4d; color: white; display: flex; align-items: center; justify-content: center; writing-mode: vertical-rl; transition: 0.3s; z-index: 1000; }
        #trash-can.visible { right: 0; }
    </style>
</head>
<body>

    <div id="web-notification">💕 收到寶寶的消息</div>

    <div id="login-screen">
        <h1 style="color: #888; margin-bottom: 20px;">選擇你的身分</h1>
        <img src="https://img0.baidu.com/it/u=3027201083,1695537574&fm=253&fmt=auto&app=138&f=JPEG?w=500&h=500" style="width:120px; border-radius:60px; margin-bottom:20px;">
        <button class="login-btn btn-ysc" onclick="initApp('ysc')">ysc</button>
        <button class="login-btn btn-lcl" onclick="initApp('lcl')">lcl</button>
    </div>

    <div id="trash-can">🗑️ 拖到這裡刪除</div>

    <div id="main-nav">
        <button class="nav-btn active" onclick="switchPage('calendar')">🗓️ 紀念日曆</button>
        <button class="nav-btn" onclick="switchPage('chat')">💬 寶寶通訊</button>
    </div>

    <div id="page-calendar" class="page active">
        <div id="together-days">已經在一起 0 天了</div>

        <div class="section">
            <h2>🗓️ 滾動日曆 (點 ❤️ 紀錄愛愛)</h2>
            <div id="weekdayHeaders" class="calendar-grid" style="text-align:center; font-size:0.7rem; color:#ccc; margin-bottom:5px;"></div>
            <div id="rollingCalendar" class="calendar-grid"></div>
        </div>

        <div class="section">
            <h2>🍰 願望清單 (可拖動)</h2>
            <div class="input-group" style="display:flex; gap:5px; margin-bottom:15px;">
                <input type="text" id="wishInput" placeholder="想和寶寶做什麼..." style="flex:1; padding:10px; border-radius:10px; border:1px solid #eee;">
                <button onclick="addWish('activity')" style="padding:10px; border-radius:10px; background:var(--accent); color:white; border:none; font-weight:bold;">添加</button>
            </div>
            <div id="list-activity"></div>
        </div>

        <div class="section">
            <div class="archive-toggle" onclick="toggleArchive()">📜 查看我們的歷史紀錄 (點擊展開)</div>
            <div id="archiveList"></div>
        </div>
    </div>

    <div id="page-chat" class="page">
        <div class="section" style="padding:10px;">
            <div id="chat-container">
                <div id="chat-messages"></div>
                <div id="chat-input-area" style="display:flex; padding:10px; background:white; gap:5px;">
                    <label for="image-input" style="font-size:1.5rem;">📸</label>
                    <input type="file" id="image-input" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">
                    <input type="text" id="chat-input-text" placeholder="輸入消息..." style="flex:1; border-radius:20px; border:1px solid #eee; padding:5px 15px;">
                    <button id="chat-send-btn" onclick="sendChatMessage()" style="background:none; border:none; color:var(--accent); font-weight:bold;">送出</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDvzd2ZhT-HfuJoJ28S14cun-6D_wNILtg",
            authDomain: "ourloveplanner.firebaseapp.com",
            databaseURL: "https://ourloveplanner-default-rtdb.firebaseio.com",
            projectId: "ourloveplanner",
            storageBucket: "ourloveplanner.firebasestorage.app",
            messagingSenderId: "671815155990",
            appId: "1:671815155990:web:ce0adcdd59f1778cb41037"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = '', lastMsgCount = -1, draggedItem = null;
        const startDate = new Date('2024-09-18');

        function initApp(u) {
            currentUser = u;
            document.getElementById('login-screen').style.display = 'none';
            document.documentElement.style.setProperty('--accent', (u === 'ysc' ? '#607d8b' : '#ffafbd'));
            
            const diff = Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24)) + 1;
            document.getElementById('together-days').innerText = `已經在一起 ${diff} 天了`;

            db.ref('data').on('value', s => render(s.val() || {}));
        }

        function switchPage(p) {
            document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(bn => bn.classList.remove('active'));
            document.getElementById('page-' + p).classList.add('active');
            event.target.classList.add('active');
            if(p === 'chat') setTimeout(() => { const c = document.getElementById('chat-messages'); c.scrollTop = c.scrollHeight; }, 100);
        }

        function toggleArchive() {
            const list = document.getElementById('archiveList');
            list.style.display = (list.style.display === 'block' ? 'none' : 'block');
        }

        function addWish(cat) {
            const i = document.getElementById('wishInput');
            if(!i.value) return;
            db.ref(`data/wishes/${cat}`).push({ text: i.value, by: currentUser });
            i.value = '';
        }

        function sendChatMessage() {
            const i = document.getElementById('chat-input-text');
            if(!i.value) return;
            db.ref('data/chats').push({ type: 'text', text: i.value, by: currentUser, time: Date.now() });
            i.value = '';
        }

        function handleImageUpload(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => db.ref('data/chats').push({ type: 'image', imgBase64: ev.target.result, by: currentUser, time: Date.now() });
            reader.readAsDataURL(file);
        }

        function render(data) {
            // 1. 垃圾桶與拖拽
            const trash = document.getElementById('trash-can');
            trash.ondragover = (e) => e.preventDefault();
            trash.ondrop = () => {
                if(draggedItem.type === 'wish') db.ref(`data/wishes/${draggedItem.cat}/${draggedItem.id}`).remove();
                if(draggedItem.type === 'plan') db.ref(`data/plans/${draggedItem.date}/${draggedItem.id}`).remove();
            };

            // 2. 吵架偵測 (24小時無消息)
            const chats = Object.values(data.chats || {});
            const lastTime = chats.length ? chats[chats.length-1].time : 0;
            if(lastTime > 0 && (Date.now() - lastTime > 86400000)) {
                const today = new Date().toLocaleDateString();
                if(!data.archives || !Object.values(data.archives).find(a => a.date === today && a.type === 'fight')) {
                    db.ref('data/archives').push({ type: 'fight', text: '💣 寶寶今天好像吵架了', date: today });
                }
            }

            // 3. 渲染聊天
            const msgBox = document.getElementById('chat-messages');
            msgBox.innerHTML = '';
            chats.forEach(m => {
                const b = document.createElement('div');
                b.className = `msg-bubble ${m.by === currentUser ? 'me' : 'other'}`;
                if(m.type === 'text') b.innerText = m.text;
                else b.innerHTML = `<img src="${m.imgBase64}">`;
                msgBox.appendChild(b);
            });

            // 4. 渲染願望
            const wishBox = document.getElementById('list-activity');
            wishBox.innerHTML = '';
            Object.entries(data.wishes?.activity || {}).forEach(([id, w]) => {
                const d = document.createElement('div');
                d.className = 'wish-item'; d.draggable = true;
                d.style = "display:flex;justify-content:space-between;padding:8px;border:1px solid #f0f0f0;margin-bottom:5px;border-radius:8px;";
                d.innerHTML = `<span>${w.text}</span>`;
                d.ondragstart = () => { draggedItem = { type:'wish', cat:'activity', id, text:w.text }; trash.classList.add('visible'); };
                d.ondragend = () => trash.classList.remove('visible');
                wishBox.appendChild(d);
            });

            // 5. 渲染日曆
            const cal = document.getElementById('rollingCalendar');
            cal.innerHTML = '';
            const now = new Date(); now.setHours(0,0,0,0);
            const start = new Date(now); start.setDate(now.getDate() - now.getDay());

            for(let i=0; i<35; i++) {
                const curr = new Date(start); curr.setDate(start.getDate() + i);
                const dKey = curr.toLocaleDateString();
                const card = document.createElement('div');
                card.className = `day-card ${dKey === now.toLocaleDateString() ? 'is-today' : ''}`;
                card.innerHTML = `<span style="font-size:0.6rem;color:#ccc;">${curr.getDate()}</span><div class="heart-quick-btn">❤️</div>`;
                
                // 愛心快捷鍵
                card.querySelector('.heart-quick-btn').onclick = (e) => { e.stopPropagation(); db.ref(`data/plans/${dKey}`).push('❤️'); };
                
                card.ondragover = (e) => e.preventDefault();
                card.ondrop = () => {
                    if(draggedItem.type === 'wish') { db.ref(`data/plans/${dKey}`).push(draggedItem.text); db.ref(`data/wishes/${draggedItem.cat}/${draggedItem.id}`).remove(); }
                    else { db.ref(`data/plans/${dKey}`).push(draggedItem.text); db.ref(`data/plans/${draggedItem.date}/${draggedItem.id}`).remove(); }
                };

                if(data.plans?.[dKey]) {
                    Object.entries(data.plans[dKey]).forEach(([pid, p]) => {
                        const t = document.createElement('div');
                        t.className = 'plan-tag'; t.draggable = true; t.innerText = p;
                        t.ondragstart = (e) => { e.stopPropagation(); draggedItem = { type:'plan', date:dKey, id:pid, text:p }; trash.classList.add('visible'); };
                        card.appendChild(t);
                    });
                }
                cal.appendChild(card);
            }

            // 6. 渲染歷史紀錄
            const archBox = document.getElementById('archiveList');
            archBox.innerHTML = '';
            Object.values(data.archives || {}).reverse().forEach(a => {
                archBox.innerHTML += `<div style="padding:5px 0; border-bottom:1px solid #f9f9f9;">${a.date}: ${a.text}</div>`;
            });
        }
    </script>
</body>
</html>
