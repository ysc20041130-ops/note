<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Love Story - Full Detailed Version</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        /* --- 基礎變量 --- */
        :root {
            --ysc-color: #607d8b;
            --lcl-color: #ffafbd;
            --bg-pink: #fdf2f4;
            --white: #ffffff;
            --gray-deep: #444444;   
            --gray-mid: #888888;    
            --gray-plan: #333333;   
            --shadow-standard: 0 10px 30px rgba(0,0,0,0.08);
            --curve: cubic-bezier(0.175, 0.885, 0.32, 1.275);
            --transition-fast: 0.3s ease;
        }

        * { 
            box-sizing: border-box; 
            font-family: "PingFang HK", "Helvetica Neue", sans-serif; 
            -webkit-tap-highlight-color: transparent; 
        }

        body { 
            background: var(--bg-pink); 
            margin: 0; 
            padding: 0;
            overflow-x: hidden; 
            touch-action: pan-y; 
        }

        /* --- 身份選擇頁 --- */
        #identity-screen {
            position: fixed; 
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-pink); 
            z-index: 10000;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }
        .welcome-title { 
            font-size: 2.8rem; 
            color: #8a8a8a; 
            margin-bottom: 50px; 
            font-weight: 300; 
            letter-spacing: 5px; 
        }
        .btn-identity {
            width: 300px; 
            padding: 25px; 
            margin: 15px; 
            border: none; 
            border-radius: 50px;
            font-size: 1.4rem; 
            font-weight: bold; 
            color: white; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .btn-ysc-main { background: var(--ysc-color); box-shadow: 0 10px 25px rgba(96, 125, 139, 0.3); }
        .btn-lcl-main { background: var(--lcl-color); box-shadow: 0 10px 25px rgba(255, 175, 189, 0.3); }

        /* --- 頂部導航 --- */
        header {
            position: sticky; 
            top: 0; 
            z-index: 8000; 
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(15px); 
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        nav { 
            display: flex; 
            justify-content: space-around; 
            padding: 20px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }
        .nav-link { 
            background: none; 
            border: none; 
            font-size: 1.15rem; 
            font-weight: 900; 
            color: #ccc; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .nav-link.active { color: var(--accent); transform: scale(1.1); }

        /* --- 控制按鈕優化 --- */
        #undo-master-btn {
            position: fixed; 
            top: 80px; /* 往下一點，避開導航欄 */
            right: 20px; 
            z-index: 9000;
            background: var(--white); 
            border: 1px solid #eee; 
            border-radius: 50%; 
            width: 60px; 
            height: 60px;
            box-shadow: var(--shadow-standard); 
            font-size: 1.6rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }

        /* 垃圾桶移動到底部 */
        #dynamic-trash {
            position: fixed; 
            bottom: -80px; /* 初始隱藏 */
            left: 0; 
            width: 100%; 
            height: 70px;
            background: #ff4d4d; 
            color: white; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: 900; 
            font-size: 1.3rem;
            z-index: 9500;
            transition: 0.3s var(--curve); 
            box-shadow: 0 -5px 20px rgba(255, 77, 77, 0.3);
        }
        #dynamic-trash.active { bottom: 0; }

        /* --- 紀念日曆模塊 --- */
        .main-scroller { 
            max-width: 1300px; 
            margin: 0 auto; 
            padding: 15px; 
            height: calc(100vh - 80px);
            overflow-y: auto;
        }
        .app-view { display: none; }
        .app-view.active { display: block; animation: slideUp 0.5s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card { 
            background: var(--white); 
            border-radius: 30px; 
            padding: 25px; 
            margin-bottom: 25px; 
            box-shadow: var(--shadow-standard); 
            position: relative; 
        }

        .text-together-days { 
            font-size: 1.8rem; /* 修正字號 */
            font-weight: 900; 
            color: var(--accent); 
            margin: 0; 
            text-align: center;
        }
        .text-happy-index { 
            font-size: 1.1rem; 
            color: #bbb; 
            margin: 10px 0 20px; 
            text-align: center;
        }
        .btn-sign-daily {
            display: block; margin: 0 auto;
            padding: 14px 50px; 
            border-radius: 40px; 
            border: none; 
            background: var(--accent);
            color: white; 
            font-weight: bold; 
            font-size: 1.1rem; 
        }

        /* 日曆手機大圖優化 */
        .calendar-section { padding: 5px 0; position: relative; }
        .calendar-week-labels { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            text-align: center; 
            padding: 10px 0; 
            color: var(--gray-deep);
            font-weight: 900; 
            font-size: 0.8rem; 
        }
        .calendar-main-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 5px; 
        }
        .calendar-day-box {
            background: #fff; 
            border: 1px solid #f5f5f5; 
            border-radius: 12px; 
            min-height: 90px; 
            padding: 6px;
            display: flex; flex-direction: column; 
            position: relative;
        }
        .calendar-day-label { font-size: 0.75rem; font-weight: 800; color: var(--gray-mid); }
        .calendar-day-box.is-locked { background: #fcfcfc; color: #eee; }

        /* ❤️ 快捷按鈕回歸 */
        .heart-shortcut-container {
            position: absolute;
            right: 0;
            top: -15px;
            z-index: 10;
        }
        .btn-heart-pulse { 
            width: 55px; height: 55px; 
            border-radius: 50%; 
            border: 3px solid var(--accent); 
            background: white; 
            color: var(--accent); 
            font-size: 1.4rem; 
            box-shadow: var(--shadow-standard);
            cursor: pointer;
        }

        .tag-event {
            background: var(--accent); 
            color: white; 
            font-size: 0.75rem; 
            padding: 5px 8px; 
            border-radius: 8px;
            margin-top: 4px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        .tag-event.dragging-active { 
            position: fixed; z-index: 11000; width: 120px !important; opacity: 0.9;
        }

        /* 未來計劃 */
        .plan-category-box { 
            background: #fafafa; border: 2px dashed #eee; 
            border-radius: 25px; padding: 20px; 
            margin-bottom: 25px; 
        }
        .plan-category-box h4 { 
            margin: 0 0 15px 0; 
            font-size: 1.15rem; /* 與小提醒一致 */
            color: var(--gray-plan); 
            font-weight: 900; 
        }

        /* --- 寶寶通訊 --- */
        #chat-message-container { 
            height: 65vh; overflow-y: auto; 
            padding: 15px; display: flex; flex-direction: column; gap: 15px; 
            background: #fff; border-radius: 25px;
        }
        .chat-msg-body { 
            max-width: 80%; padding: 14px 18px; 
            border-radius: 22px; font-size: 1rem; line-height: 1.4; 
        }
        .me .chat-msg-body { background: var(--accent); color: white; border-bottom-right-radius: 4px; }
        .you .chat-msg-body { background: #f0f0f0; color: #333; border-bottom-left-radius: 4px; }

        .chat-dock-fixed {
            position: fixed; bottom: 0; left: 0; width: 100%; 
            background: white; padding: 15px 20px 35px;
            display: flex; align-items: center; gap: 15px; 
            border-top: 1px solid #f0f0f0; z-index: 7000;
        }
        .chat-input-pill { flex: 1; background: #f5f5f5; border-radius: 30px; padding: 0 15px; }
        .chat-input-pill input { width: 100%; border: none; background: transparent; padding: 12px 0; }

        /* --- 歷史紀錄 --- */
        .history-card-item { padding: 20px; border-bottom: 1px solid #f5f5f5; position: relative; }
        .history-main-label { display: block; font-weight: 900; font-size: 1.1rem; margin-bottom: 5px; }
        .history-date-label { font-size: 0.8rem; color: #ccc; }

        #gemini-report-trigger {
            position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(45deg, #ffafbd, #ffc3a0);
            padding: 18px 40px; border-radius: 50px; color: white; border: none; font-weight: 900;
        }
    </style>
</head>
<body>

    <div id="identity-screen">
        <div class="welcome-title">Love Story</div>
        <button class="btn-identity btn-ysc-main" onclick="startApp('ysc')">我是 ysc</button>
        <button class="btn-identity btn-lcl-main" onclick="startApp('lcl')">我是 lcl</button>
    </div>

    <button id="undo-master-btn" onclick="handleUndoSystem()">↩️</button>
    <div id="dynamic-trash">🗑️ 釋放以刪除</div>

    <header>
        <nav>
            <button class="nav-link active" id="btn-nav-cal" onclick="navigateTo('cal')">紀念日曆</button>
            <button class="nav-link" id="btn-nav-chat" onclick="navigateTo('chat')">寶寶通訊</button>
            <button class="nav-link" id="btn-nav-hist" onclick="navigateTo('hist')">歷史紀錄</button>
        </nav>
    </header>

    <div class="main-scroller">
        
        <div id="view-cal" class="app-view active">
            <div class="glass-card">
                <p class="text-together-days" id="val-together-days">載入中...</p>
                <p class="text-happy-index" id="val-happiness-score">我們的幸福指數：0.0</p>
                <button class="btn-sign-daily" onclick="executeSignAction()">每日打卡</button>
            </div>

            <div class="glass-card">
                <small style="color:#000; font-weight:900; font-size:1.15rem;">🔔 給對方的小提醒</small>
                <div id="reminder-display-list" style="margin-top:15px;"></div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <input type="text" id="remind-msg-input" placeholder="提醒對方..." style="flex:1; border:1px solid #eee; border-radius:10px; padding:10px;">
                    <button onclick="submitRemindToPartner()" style="background:var(--accent); color:white; border:none; border-radius:10px; padding:0 15px;">發送</button>
                </div>
            </div>

            <div class="calendar-section">
                <div class="heart-shortcut-container">
                    <button class="btn-heart-pulse" onclick="quickAddHeartToCalendar()">❤️</button>
                </div>
                <div class="calendar-week-labels">
                    <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
                </div>
                <div id="calendar-render-grid" class="calendar-main-grid"></div>
            </div>

            <div style="margin-top:30px;">
                <div class="plan-category-box" id="pbox-eat">
                    <h4>🍔 豬癮犯了</h4>
                    <div id="list-render-eat"></div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <input type="text" id="in-plan-eat" placeholder="添加想吃的..." style="flex:1; border:none; padding:10px; border-radius:10px;">
                        <button onclick="createNewPlanItem('eat')" style="background:var(--accent); color:white; border:none; border-radius:10px; width:40px;">+</button>
                    </div>
                </div>
                <div class="plan-category-box" id="pbox-go">
                    <h4>📍 腳好累呀</h4>
                    <div id="list-render-go"></div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <input type="text" id="in-plan-go" placeholder="想去哪裡..." style="flex:1; border:none; padding:10px; border-radius:10px;">
                        <button onclick="createNewPlanItem('go')" style="background:var(--accent); color:white; border:none; border-radius:10px; width:40px;">+</button>
                    </div>
                </div>
                <div class="plan-category-box" id="pbox-do">
                    <h4>✨ 好無聊呀</h4>
                    <div id="list-render-do"></div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <input type="text" id="in-plan-do" placeholder="想做什麼..." style="flex:1; border:none; padding:10px; border-radius:10px;">
                        <button onclick="createNewPlanItem('do')" style="background:var(--accent); color:white; border:none; border-radius:10px; width:40px;">+</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-chat" class="app-view">
            <div id="chat-message-container"></div>
            <div class="chat-dock-fixed">
                <span style="font-size: 1.8rem;">🖼️</span>
                <div class="chat-input-pill">
                    <input type="text" id="chat-text-field" placeholder="傳送訊息...">
                </div>
                <button onclick="sendChatTextMessage()" style="background:#4caf50; color:white; border:none; width:45px; height:45px; border-radius:50%;">↑</button>
            </div>
        </div>

        <div id="view-hist" class="app-view">
            <div id="history-master-list"></div>
            <button id="gemini-report-trigger">生成戀愛週報</button>
        </div>

    </div>

    <script>
        // 1. 初始化
        const FB_CONFIG = {
            apiKey: "AIzaSyDvzd2ZhT-HfuJoJ28S14cun-6D_wNILtg",
            authDomain: "ourloveplanner.firebaseapp.com",
            databaseURL: "https://ourloveplanner-default-rtdb.firebaseio.com",
            projectId: "ourloveplanner",
            storageBucket: "ourloveplanner.firebasestorage.app",
            messagingSenderId: "671815155990",
            appId: "1:671815155990:web:ce0adcdd59f1778cb41037"
        };
        firebase.initializeApp(FB_CONFIG);
        const rtdb = firebase.database();

        let CURRENT_USER = '';
        let UNDO_STACK = [];
        let DRAG_CONTEXT = null;
        let DRAG_MIRROR = null;
        const START_DATE = new Date('2024-09-18');

        function startApp(role) {
            CURRENT_USER = role;
            document.getElementById('identity-screen').style.display = 'none';
            document.documentElement.style.setProperty('--accent', role === 'ysc' ? 'var(--ysc-color)' : 'var(--lcl-color)');
            
            const diff = Math.ceil(Math.abs(new Date() - START_DATE) / (1000 * 60 * 60 * 24));
            document.getElementById('val-together-days').innerText = `在一起 ${diff} 日`;
            
            syncData();
            runBackgroundTasks();
        }

        function navigateTo(id) {
            document.querySelectorAll('.app-view, .nav-link').forEach(el => el.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.getElementById('btn-nav-' + id).classList.add('active');
        }

        // 2. 數據核心
        function syncData() {
            rtdb.ref('love_v12_full').on('value', snapshot => {
                const data = snapshot.val() || {};
                renderCalendar(data.calendar || {});
                renderReminders(data.reminders || {});
                renderPlans(data.plans || {});
                renderChats(data.chats || {});
                renderHistory(data.history || {});
                updateHappiness(data.calendar || {}, data.signs || {});
            });
        }

        async function saveAction(path, val, log) {
            const snap = await rtdb.ref('love_v12_full').once('value');
            UNDO_STACK.push({ payload: snap.val(), label: log });
            rtdb.ref('love_v12_full/' + path).push(val);
            if (!path.includes('chats')) recordHistory(log);
            rtdb.ref('love_v12_full/last_active').set(Date.now());
        }

        function handleUndoSystem() {
            if (!UNDO_STACK.length) return alert("沒有紀錄");
            const last = UNDO_STACK.pop();
            rtdb.ref('love_v12_full').set(last.payload);
            alert("已撤回：" + last.label);
        }

        // 3. 拖拽引擎
        function makeDraggable(dom, meta) {
            const onStart = (x, y) => {
                DRAG_CONTEXT = meta;
                DRAG_MIRROR = dom.cloneNode(true);
                DRAG_MIRROR.classList.add('tag-event', 'dragging-active');
                DRAG_MIRROR.style.left = x - 20 + 'px';
                DRAG_MIRROR.style.top = y - 10 + 'px';
                document.body.appendChild(DRAG_MIRROR);
                document.getElementById('dynamic-trash').classList.add('active');
            };
            dom.onmousedown = (e) => onStart(e.clientX, e.clientY);
            dom.ontouchstart = (e) => onStart(e.touches[0].clientX, e.touches[0].clientY);
        }

        window.onmousemove = window.ontouchmove = (e) => {
            if (!DRAG_MIRROR) return;
            const x = e.clientX || e.touches[0].clientX;
            const y = e.clientY || e.touches[0].clientY;
            DRAG_MIRROR.style.left = x - 20 + 'px';
            DRAG_MIRROR.style.top = y - 10 + 'px';
        };

        window.onmouseup = window.ontouchend = (e) => {
            if (!DRAG_MIRROR) return;
            const x = e.clientX || e.changedTouches[0].clientX;
            const y = e.clientY || e.changedTouches[0].clientY;
            const target = document.elementFromPoint(x, y);
            const trash = document.getElementById('dynamic-trash');

            if (target === trash || trash.contains(target)) {
                if (DRAG_CONTEXT.source === 'CAL') rtdb.ref(`love_v12_full/calendar/${DRAG_CONTEXT.date}/${DRAG_CONTEXT.id}`).remove();
                else rtdb.ref(`love_v12_full/plans/${DRAG_CONTEXT.cat}/${DRAG_CONTEXT.id}`).remove();
            } else {
                const day = target.closest('.calendar-day-box');
                if (day) {
                    const newDate = day.dataset.date;
                    if (DRAG_CONTEXT.source === 'CAL') rtdb.ref(`love_v12_full/calendar/${DRAG_CONTEXT.date}/${DRAG_CONTEXT.id}`).remove();
                    else rtdb.ref(`love_v12_full/plans/${DRAG_CONTEXT.cat}/${DRAG_CONTEXT.id}`).remove();
                    rtdb.ref(`love_v12_full/calendar/${newDate}`).push(DRAG_CONTEXT.val);
                }
            }
            DRAG_MIRROR.remove(); DRAG_MIRROR = null;
            trash.classList.remove('active');
        };

        // 4. 渲染邏輯
        function renderCalendar(cal) {
            const grid = document.getElementById('calendar-render-grid');
            grid.innerHTML = '';
            const start = new Date(); start.setDate(start.getDate() - start.getDay());
            
            for (let i = 0; i < 35; i++) {
                const d = new Date(start); d.setDate(start.getDate() + i);
                const k = d.toISOString().split('T')[0];
                const cell = document.createElement('div');
                cell.className = `calendar-day-box ${d < new Date().setHours(0,0,0,0) ? 'is-locked' : ''}`;
                cell.dataset.date = k;
                cell.innerHTML = `<span class="calendar-day-label">${d.getDate()}</span>`;

                if (cal[k]) {
                    Object.entries(cal[k]).forEach(([id, val]) => {
                        const tag = document.createElement('div');
                        tag.className = 'tag-event'; tag.innerText = val;
                        makeDraggable(tag, { source: 'CAL', date: k, id, val });
                        cell.appendChild(tag);
                    });
                }
                cell.onclick = (e) => { if(e.target === cell) { 
                    const t = prompt("事件內容："); 
                    if(t) saveAction(`calendar/${k}`, t, "日曆添加："+t); 
                }};
                grid.appendChild(cell);
            }
        }

        function renderPlans(plans) {
            ['eat', 'go', 'do'].forEach(cat => {
                const l = document.getElementById('list-render-' + cat);
                l.innerHTML = '';
                Object.entries(plans[cat] || {}).forEach(([id, val]) => {
                    const tag = document.createElement('div');
                    tag.className = 'tag-event'; tag.innerText = val;
                    makeDraggable(tag, { source: 'PLAN', cat, id, val });
                    l.appendChild(tag);
                });
            });
        }

        function renderReminders(rems) {
            const l = document.getElementById('reminder-display-list');
            l.innerHTML = '';
            Object.entries(rems[CURRENT_USER] || {}).forEach(([id, info]) => {
                const d = document.createElement('div');
                d.innerHTML = `<div style="padding:10px; background:#fffafb; border-radius:10px; margin-bottom:5px; display:flex; justify-content:space-between;">
                    <span>💌 ${info.msg}</span><button onclick="clearRem('${id}')" style="border:none; background:none;">✅</button>
                </div>`;
                l.appendChild(d);
            });
        }

        function renderChats(chats) {
            const c = document.getElementById('chat-message-container');
            c.innerHTML = '';
            Object.entries(chats).forEach(([id, m]) => {
                const d = document.createElement('div');
                d.className = `chat-bubble-row ${m.sender === CURRENT_USER ? 'me' : 'you'}`;
                d.innerHTML = `<div class="chat-msg-body">${m.val}</div>`;
                c.appendChild(d);
            });
            c.scrollTop = c.scrollHeight;
        }

        function renderHistory(hist) {
            const l = document.getElementById('history-master-list');
            l.innerHTML = '';
            Object.entries(hist).reverse().forEach(([id, item]) => {
                const d = document.createElement('div');
                d.className = 'history-card-item';
                d.innerHTML = `<span class="history-main-label">${item.text}</span><span class="history-date-label">${item.ts}</span>`;
                l.appendChild(d);
            });
        }

        // 5. 功能函數
        async function executeSignAction() {
            const k = new Date().toISOString().split('T')[0];
            const check = await rtdb.ref(`love_v12_full/signs/${k}/${CURRENT_USER}`).once('value');
            if (check.exists()) return alert("已打卡");
            rtdb.ref(`love_v12_full/signs/${k}/${CURRENT_USER}`).set(true);
            recordHistory("今日成功打卡！");
        }

        function recordHistory(t) {
            const d = new Date();
            const ts = `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${d.getMinutes()}`;
            rtdb.ref('love_v12_full/history').push({ text: t, ts: ts });
        }

        function updateHappiness(cal, signs) {
            let score = 0;
            Object.values(cal).forEach(day => Object.values(day).forEach(v => {
                if(v.includes('❤️')) score += 7;
                if(v.includes('💣')) score -= 7;
            }));
            document.getElementById('val-happiness-score').innerText = `我們的幸福指數：${score.toFixed(1)}`;
        }

        function runBackgroundTasks() {
            // 吵架監測
            setInterval(async () => {
                const now = new Date();
                if (now.getHours() === 23 && now.getMinutes() === 59) {
                    const snap = await rtdb.ref('love_v12_full').once('value');
                    const d = snap.val() || {};
                    if (Date.now() - (d.last_active || 0) > 86400000) {
                        rtdb.ref(`love_v12_full/calendar/${now.toISOString().split('T')[0]}`).push('💣');
                    }
                }
            }, 60000);
        }

        function submitRemindToPartner() {
            const i = document.getElementById('remind-msg-input');
            const target = CURRENT_USER === 'ysc' ? 'lcl' : 'ysc';
            if(i.value) saveAction(`reminders/${target}`, { msg: i.value }, "發送提醒：" + i.value);
            i.value = '';
        }

        function createNewPlanItem(cat) {
            const i = document.getElementById('in-plan-' + cat);
            if(i.value) saveAction(`plans/${cat}`, i.value, "添加計劃：" + i.value);
            i.value = '';
        }

        function quickAddHeartToCalendar() {
            const k = new Date().toISOString().split('T')[0];
            saveAction(`calendar/${k}`, '❤️', "添加了 ❤️");
        }

        function sendChatTextMessage() {
            const i = document.getElementById('chat-text-field');
            if(i.value) rtdb.ref('love_v12_full/chats').push({ val: i.value, sender: CURRENT_USER, ts: Date.now() });
            i.value = '';
        }

        function clearRem(id) { rtdb.ref(`love_v12_full/reminders/${CURRENT_USER}/${id}`).remove(); }
    </script>
</body>
</html>
