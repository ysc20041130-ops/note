<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Our Love Planner</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --ysc-blue: #607d8b;
            --lcl-pink: #ffafbd;
            --accent: var(--lcl-pink); /* 預設顏色 */
            --bg: #fdf2f4;
            --text: #4a4a4a;
        }

        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; color: var(--text); padding: 15px; padding-bottom: 50px; }
        
        /* 獨立登入介面 */
        #login-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fdf2f4; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .login-btn {
            width: 200px; padding: 20px; margin: 15px; border-radius: 50px;
            border: none; font-size: 1.2rem; font-weight: bold; color: white; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); transition: 0.2s;
        }
        .login-btn:active { transform: scale(0.95); }
        .btn-ysc { background-color: var(--ysc-blue); }
        .btn-lcl { background-color: var(--lcl-pink); }

        /* 主介面樣式 */
        .section { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { font-size: 1.1rem; color: var(--accent); margin-top: 0; border-bottom: 2px solid var(--bg); padding-bottom: 10px; }
        h3 { font-size: 0.9rem; color: #888; margin: 15px 0 5px 0; }
        
        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }
        input { flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #eee; outline: none; font-size: 16px; }
        button.add-btn { background: var(--accent); color: white; border: none; padding: 0 15px; border-radius: 12px; font-weight: bold; }

        .item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #f9f9f9; }
        .plan-tag { background: var(--accent); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; margin-top: 2px; cursor: pointer; }

        /* 日曆網格 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .weekday-header { font-size: 0.7rem; color: #999; text-align: center; padding-bottom: 5px; }
        .day-card { background: #fff; border: 1px solid #feefee; border-radius: 10px; min-height: 65px; padding: 5px; cursor: pointer; display: flex; flex-direction: column; overflow: hidden; }
        .day-card.is-past { background: #f5f5f5; opacity: 0.5; pointer-events: none; }
        .day-card.is-today { border: 2px solid var(--accent); background: #fff0f3; }
        .date-label { font-size: 0.6rem; font-weight: bold; color: #bbb; }

        .archive-list { font-size: 0.75rem; color: #999; max-height: 120px; overflow-y: auto; }
        .wish-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dotted #eee; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color: #888; margin-bottom: 30px;">選擇你的身分</h1>
        <button class="login-btn btn-ysc" onclick="initApp('ysc')">ysc</button>
        <button class="login-btn btn-lcl" onclick="initApp('lcl')">lcl</button>
    </div>

    <div class="section">
        <h2 id="morningTitle">早上必讀</h2>
        <div id="todoList"></div>
        <div class="input-group">
            <input type="text" id="taskInput" placeholder="給對方留個言吧...">
            <button class="add-btn" onclick="addTask()">發送</button>
        </div>
    </div>

    <div class="section">
        <h2>🗓️ 接下來 35 天</h2>
        <div id="weekdayHeaders" class="calendar-grid"></div>
        <div id="rollingCalendar" class="calendar-grid"></div>
    </div>

    <div class="section">
        <h2>🍰 願望清單 (Wish List)</h2>
        
        <h3>📍 豬癮犯了 (美食)</h3>
        <div class="input-group">
            <input type="text" id="input-food" placeholder="想吃什麼...">
            <button class="add-btn" onclick="addWish('food')">添加</button>
        </div>
        <div id="list-food"></div>

        <h3>📍 腳要痛了 (旅遊/去哪)</h3>
        <div class="input-group">
            <input type="text" id="input-travel" placeholder="想去哪裡...">
            <button class="add-btn" onclick="addWish('travel')">添加</button>
        </div>
        <div id="list-travel"></div>

        <h3>📍 總得做點什麼 (活動)</h3>
        <div class="input-group">
            <input type="text" id="input-activity" placeholder="想做什麼...">
            <button class="add-btn" onclick="addWish('activity')">添加</button>
        </div>
        <div id="list-activity"></div>
    </div>

    <div class="section">
        <h2>📜 我們的回憶</h2>
        <div id="archiveList" class="archive-list"></div>
        <button onclick="generateLoveReport()" style="width:100%; margin-top:10px; padding:10px; border-radius:10px; border:1px solid #eee; background:none; color:#999; font-size:0.8rem;">📊 生成 Gemini 戀愛報告</button>
    </div>

    <script>
        // --- Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyDvzd2ZhT-HfuJoJ28S14cun-6D_wNILtg",
            authDomain: "ourloveplanner.firebaseapp.com",
            databaseURL: "https://ourloveplanner-default-rtdb.firebaseio.com",
            projectId: "ourloveplanner",
            storageBucket: "ourloveplanner.firebasestorage.app",
            messagingSenderId: "671815155990",
            appId: "1:671815155990:web:ce0adcdd59f1778cb41037"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let currentUser = '';
        const dayNames = ['日', '一', '二', '三', '四', '五', '六'];
        const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        // --- 核心啟動 ---
        function initApp(u) {
            currentUser = u;
            document.getElementById('login-screen').style.display = 'none';
            const themeColor = (u === 'ysc') ? '#607d8b' : '#ffafbd';
            document.documentElement.style.setProperty('--accent', themeColor);
            db.ref('data').on('value', s => render(s.val() || {}));
        }

        // --- 功能函式 ---
        function getToday() { const d = new Date(); d.setHours(0,0,0,0); return d; }
        function formatDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

        function addTask() {
            const i = document.getElementById('taskInput');
            if(!i.value) return;
            db.ref('data/tasks').push({ text: i.value, from: currentUser, to: currentUser==='ysc'?'lcl':'ysc', completed: false, time: new Date().toLocaleString() });
            i.value = '';
        }

        function addWish(cat) {
            const i = document.getElementById('input-' + cat);
            if(!i.value) return;
            db.ref('data/wishes/' + cat).push({ text: i.value, by: currentUser });
            i.value = '';
        }

        function editPlan(date) {
            const val = prompt(`在 ${date} 添加計畫:`);
            if(val) db.ref('data/plans/' + date).push(val);
        }

        function deletePlan(date, id, text) {
            if(confirm(`要刪除 "${text}" 嗎？`)) {
                db.ref(`data/plans/${date}/${id}`).remove();
            }
        }

        function generateLoveReport() {
            db.ref('data').once('value', s => {
                const data = s.val() || {};
                const archives = Object.values(data.tasks || {}).filter(t => t.completed).slice(-10);
                let report = `這是我和伴侶的紀錄：\n完成：${archives.map(t=>t.text).join(', ')}\n請評價我們的互動！`;
                navigator.clipboard.writeText(report);
                alert("報告已複製，請貼給 Gemini！");
            });
        }

        // --- 渲染畫面 ---
        function render(data) {
            // 任務渲染
            const todo = document.getElementById('todoList');
            const arch = document.getElementById('archiveList');
            todo.innerHTML = ''; arch.innerHTML = '';
            document.getElementById('morningTitle').innerText = `早上必讀：${currentUser==='ysc'?'lcl':'ysc'} 的消息`;
            
            Object.entries(data.tasks || {}).reverse().forEach(([id, t]) => {
                if(t.completed) arch.innerHTML += `<div class="item" style="font-size:0.7rem;">${t.text} ✅</div>`;
                else if(t.to === currentUser) todo.innerHTML += `<div class="item"><span>${t.text}</span><button onclick="db.ref('data/tasks/${id}').update({completed:true})">✅</button></div>`;
            });

            // Wish List 分類渲染
            ['food', 'travel', 'activity'].forEach(cat => {
                const listEl = document.getElementById('list-' + cat);
                listEl.innerHTML = '';
                if(data.wishes && data.wishes[cat]) {
                    Object.entries(data.wishes[cat]).forEach(([id, w]) => {
                        listEl.innerHTML += `<div class="wish-item"><span>${w.text}</span><span onclick="db.ref('data/wishes/${cat}/${id}').remove()" style="cursor:pointer">🗑️</span></div>`;
                    });
                }
            });

            // 日曆渲染
            const cal = document.getElementById('rollingCalendar');
            const head = document.getElementById('weekdayHeaders');
            cal.innerHTML = ''; head.innerHTML = '';
            dayNames.forEach(n => head.innerHTML += `<div class="weekday-header">${n}</div>`);

            const start = getToday();
            start.setDate(start.getDate() - start.getDay());

            for(let i=0; i<35; i++) {
                const curr = new Date(start); curr.setDate(start.getDate() + i);
                const dKey = formatDate(curr);
                const isPast = curr < getToday();
                const card = document.createElement('div');
                card.className = `day-card ${isPast?'is-past':''} ${dKey===formatDate(getToday())?'is-today':''}`;
                
                if(!isPast) card.onclick = () => editPlan(dKey);

                let plansHtml = "";
                if(data.plans && data.plans[dKey]) {
                    Object.entries(data.plans[dKey]).forEach(([id, p]) => {
                        plansHtml += `<div class="plan-tag" onclick="event.stopPropagation(); deletePlan('${dKey}', '${id}', '${p}')">${p}</div>`;
                    });
                }

                const dateDisplay = `${curr.getDate()}/${monthNames[curr.getMonth()]}`;
                card.innerHTML = `<span class="date-label">${dateDisplay}</span><div style="flex:1;overflow:hidden">${plansHtml}</div>`;
                cal.appendChild(card);
            }
        }
    </script>
</body>
</html>
